<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Settings</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }
        .nav-link-custom {
            position: relative;
            color: #64748b;
            font-weight: 500;
            padding: 0.5rem 0.25rem;
            margin: 0 0.75rem;
        }
        .nav-link-custom:hover {
            color: #0d6efd;
        }
        .nav-link-custom.active {
            color: #0d6efd;
        }
        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }
        .security-banner {
            background: linear-gradient(135deg, #0b5e9e 0%, #084298 100%);
            color: white;
        }
        .settings-card {
            transition: all 0.3s ease;
        }
        .settings-card:hover {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        }
    </style>
</head>
<body>
    <script src="api.js"></script>
    <script>
        const session = StockSenseAPI.getSession();
        if (!session || session.role !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>
    
    <div id="settingsApp"></div>

    <script>
        const SettingsPage = {
            session: null,
            
            init: async function() {
                this.session = StockSenseAPI.getSession();
                await this.render();
            },
            
            render: async function() {
                const html = `
                    <!-- Security Banner -->
                    <div class="security-banner px-4 py-2 small d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-gear fs-5"></i>
                            <span>System Settings | ${this.session.name} (Admin)</span>
                        </div>
                        <button onclick="SettingsPage.logout()" class="btn btn-link text-white p-0 text-decoration-none small opacity-75">Logout</button>
                    </div>

                    <!-- Top Navigation -->
                    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
                        <div class="container">
                            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                                <div class="bg-primary bg-gradient rounded-3 p-2 text-white">
                                    <i class="bi bi-boxes fs-4"></i>
                                </div>
                                <span class="fw-bold text-dark fs-4">StockSense PH</span>
                            </a>
                            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                                <span class="navbar-toggler-icon"></span>
                            </button>
                            <div class="collapse navbar-collapse" id="navbarNav">
                                <ul class="navbar-nav ms-auto">
                                    <li class="nav-item"><a href="admin-dashboard.html" class="nav-link-custom">Dashboard</a></li>
                                    <li class="nav-item"><a href="inventory.html" class="nav-link-custom">Inventory</a></li>
                                    <li class="nav-item"><a href="sales.html" class="nav-link-custom">Sales</a></li>
                                    <li class="nav-item"><a href="customers.html" class="nav-link-custom">Customers</a></li>
                                    <li class="nav-item"><a href="reports.html" class="nav-link-custom">Reports</a></li>
                                    <li class="nav-item"><a href="#" class="nav-link-custom active">Settings</a></li>
                                </ul>
                            </div>
                        </div>
                    </nav>

                    <!-- Main Content -->
                    <main class="container py-4">
                        <h2 class="fw-bold mb-4">System Settings</h2>

                        <div class="row g-4">
                            <!-- Company Settings -->
                            <div class="col-lg-8">
                                <div class="card border-0 shadow-sm settings-card">
                                    <div class="card-body">
                                        <h5 class="fw-bold mb-4">Company Information</h5>
                                        <form class="row g-3">
                                            <div class="col-md-6">
                                                <label class="form-label small fw-medium">Company Name</label>
                                                <input type="text" class="form-control" value="StockSense PH">
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label small fw-medium">Business Permit</label>
                                                <input type="text" class="form-control" value="BR-2024-001234">
                                            </div>
                                            <div class="col-12">
                                                <label class="form-label small fw-medium">Address</label>
                                                <input type="text" class="form-control" value="123 Rizal Ave, Mandaluyong City">
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label small fw-medium">Contact Number</label>
                                                <input type="text" class="form-control" value="+63 2 8888 7777">
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label small fw-medium">Email</label>
                                                <input type="email" class="form-control" value="info@stocksense.ph">
                                            </div>
                                            <div class="col-12">
                                                <button class="btn btn-primary">Save Changes</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>

                            <!-- Quick Actions -->
                            <div class="col-lg-4">
                                <div class="card border-0 shadow-sm settings-card">
                                    <div class="card-body">
                                        <h5 class="fw-bold mb-4">Quick Actions</h5>
                                        <div class="d-grid gap-2">
                                            <button class="btn btn-outline-primary text-start p-3">
                                                <i class="bi bi-download me-2"></i> Export All Data
                                            </button>
                                            <button class="btn btn-outline-success text-start p-3">
                                                <i class="bi bi-arrow-repeat me-2"></i> System Backup
                                            </button>
                                            <button class="btn btn-outline-info text-start p-3">
                                                <i class="bi bi-envelope me-2"></i> Email Configuration
                                            </button>
                                            <button class="btn btn-outline-warning text-start p-3">
                                                <i class="bi bi-people me-2"></i> User Management
                                            </button>
                                            <button onclick="SettingsPage.clearAllData()" class="btn btn-outline-danger text-start p-3">
                                                <i class="bi bi-exclamation-triangle me-2"></i> Clear All Data (Demo)
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Security Settings -->
                            <div class="col-12">
                                <div class="card border-0 shadow-sm settings-card">
                                    <div class="card-body">
                                        <h5 class="fw-bold mb-4">Security Settings</h5>
                                        <div class="row g-4">
                                            <div class="col-md-4">
                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" id="twoFactor" checked>
                                                    <label class="form-check-label fw-medium" for="twoFactor">
                                                        Two-Factor Authentication
                                                    </label>
                                                    <p class="small text-secondary mt-1">Require OTP for admin logins</p>
                                                </div>
                                            </div>
                                            <div class="col-md-4">
                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" id="sessionTimeout" checked>
                                                    <label class="form-check-label fw-medium" for="sessionTimeout">
                                                        Session Timeout (30 min)
                                                    </label>
                                                    <p class="small text-secondary mt-1">Auto-logout after inactivity</p>
                                                </div>
                                            </div>
                                            <div class="col-md-4">
                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" id="lockout" checked>
                                                    <label class="form-check-label fw-medium" for="lockout">
                                                        Failed Login Lockout
                                                    </label>
                                                    <p class="small text-secondary mt-1">3 attempts = temporary lock</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="alert alert-warning bg-opacity-10 border-0 mt-4">
                                            <i class="bi bi-exclamation-triangle me-2"></i>
                                            Security changes will take effect immediately
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                `;
                document.getElementById('settingsApp').innerHTML = html;
            },
            
            clearAllData: async function() {
                if (confirm('Are you sure? This will clear all demo data.')) {
                    localStorage.clear();
                    sessionStorage.clear();
                    alert('All data cleared!');
                    window.location.href = 'login.html';
                }
            },
            
            logout: async function() {
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            }
        };

        SettingsPage.init();
    </script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
