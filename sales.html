<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Sales</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        .nav-link-custom {
            position: relative;
            color: #64748b;
            font-weight: 500;
            padding: 0.5rem 0.25rem;
            margin: 0 0.75rem;
            text-decoration: none;
        }
        .nav-link-custom:hover {
            color: #0d6efd;
        }
        .nav-link-custom.active {
            color: #0d6efd;
        }
        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }
        /* Staff theme overrides */
        .staff-theme .nav-link-custom:hover {
            color: #0f5132 ;
        }
        .staff-theme .nav-link-custom.active {
            color: #198754;
        }
        .staff-theme .nav-link-custom.active::after {
            background: #198754;
        }
        .staff-theme .btn-primary {
            background-color: #198754;
            border-color: #198754;
        }
        .staff-theme .btn-primary:hover {
            background-color: #146c43;
            border-color: #146c43;
        }
        .staff-theme .text-primary {
            color: #198754 !important;
        }
        .staff-theme .bg-primary {
            background-color: #198754 !important;
        }
        .staff-theme .bg-primary.bg-gradient {
            background: linear-gradient(135deg, #198754 0%, #146c43 100%) !important;
        }
        .security-banner {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        .admin-banner {
            background: linear-gradient(135deg, #0b5e9e 0%, #084298 100%);
            color: white;
        }
        .staff-banner {
            background: linear-gradient(135deg, #198754 0%, #146c43 100%);
            color: white;
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <!-- INLINE API - Everything is self-contained -->
    <script>
        // ==========================================
        // STOCKSENSE API - COMPLETE SELF-CONTAINED
        // ==========================================
        
        // Create the API object
        const StockSenseAPI = (function() {
            console.log('🔥 StockSense API initializing (inline version)...');
            
            // ==================== USER DATABASE ====================
            const users = [
                { username: 'admin', password: 'Admin@1234567890abc', role: 'admin', employeeId: 'EMP-2024-001', name: 'Admin User' },
                { username: 'staff', password: 'Staff@1234567890xyz', role: 'staff', employeeId: 'EMP-2024-002', name: 'Staff User' }
            ];

            // ==================== SECURITY STATE ====================
            let security = {
                failures: 0,
                stage: 0,
                lockedUntil: null,
                permanentlyLocked: false,
                permanentLockTime: null
            };

            // ==================== INVENTORY DATA ====================
            const inventory = [
                { id: 1, name: 'Laptop - Dell XPS 15', sku: 'LAP-DEL-001', category: 'Electronics', price: 75000, stock: 45, reorderLevel: 10 },
                { id: 2, name: 'Wireless Mouse', sku: 'ACC-MOU-002', category: 'Accessories', price: 850, stock: 230, reorderLevel: 30 },
                { id: 3, name: 'Mechanical Keyboard', sku: 'ACC-KEY-003', category: 'Accessories', price: 2500, stock: 120, reorderLevel: 20 },
                { id: 4, name: 'Monitor 24"', sku: 'MON-24-004', category: 'Electronics', price: 8500, stock: 67, reorderLevel: 15 },
                { id: 5, name: 'Printer - LaserJet', sku: 'PRI-LAS-005', category: 'Office', price: 5500, stock: 8, reorderLevel: 10 },
                { id: 6, name: 'USB-C Hub', sku: 'ACC-USB-006', category: 'Accessories', price: 1200, stock: 0, reorderLevel: 15 },
                { id: 7, name: 'External SSD 1TB', sku: 'STR-SSD-007', category: 'Storage', price: 4500, stock: 34, reorderLevel: 10 },
                { id: 8, name: 'Webcam 1080p', sku: 'ACC-WEB-008', category: 'Accessories', price: 2300, stock: 18, reorderLevel: 10 },
                { id: 9, name: 'Headset', sku: 'ACC-HEAD-009', category: 'Accessories', price: 1800, stock: 42, reorderLevel: 15 },
                { id: 10, name: 'Tablet Stand', sku: 'ACC-STD-010', category: 'Accessories', price: 650, stock: 55, reorderLevel: 20 }
            ];

            // ==================== SALES DATA ====================
            const sales = [
                { id: 'INV-2024-1001', date: '2024-02-28', customer: 'Juan Dela Cruz', items: 3, total: 14275, payment: 'GCash', status: 'Completed' },
                { id: 'INV-2024-1002', date: '2024-02-28', customer: 'Maria Santos', items: 1, total: 5299.99, payment: 'Maya', status: 'Completed' },
                { id: 'INV-2024-1003', date: '2024-02-27', customer: 'Jose Rizal III', items: 5, total: 32567.50, payment: 'Bank Transfer', status: 'Completed' },
                { id: 'INV-2024-1004', date: '2024-02-27', customer: 'Ana Marie Reyes', items: 2, total: 8456.00, payment: 'COD', status: 'Pending' },
                { id: 'INV-2024-1005', date: '2024-02-26', customer: 'Carlos Mercado', items: 4, total: 24932.25, payment: 'GCash', status: 'Completed' },
                { id: 'INV-2024-1006', date: '2024-02-26', customer: 'Kristine Flores', items: 6, total: 41280.75, payment: 'Maya', status: 'Processing' },
                { id: 'INV-2024-1007', date: '2024-02-25', customer: 'Roberto Garcia', items: 2, total: 12500.00, payment: 'Bank Transfer', status: 'Completed' },
                { id: 'INV-2024-1008', date: '2024-02-25', customer: 'Lisa Wong', items: 3, total: 8900.50, payment: 'GCash', status: 'Completed' }
            ];

            // ==================== CUSTOMER DATA ====================
            const customers = [
                { id: 1, name: 'Juan Dela Cruz', email: 'juan.delacruz@email.com', phone: '0917-123-4567', city: 'Mandaluyong City', orders: 15, totalSpent: 187500, status: 'active', type: 'regular' },
                { id: 2, name: 'Maria Santos', email: 'maria.santos@email.com', phone: '0928-234-5678', city: 'Quezon City', orders: 8, totalSpent: 84500, status: 'active', type: 'vip' },
                { id: 3, name: 'Jose Rizal III', email: 'jose.rizal@email.com', phone: '0939-345-6789', city: 'Calamba, Laguna', orders: 23, totalSpent: 312000, status: 'active', type: 'vip' },
                { id: 4, name: 'Ana Marie Reyes', email: 'ana.reyes@email.com', phone: '0945-456-7890', city: 'Cebu City', orders: 5, totalSpent: 32450, status: 'active', type: 'regular' },
                { id: 5, name: 'Carlos Mercado', email: 'carlos.mercado@email.com', phone: '0956-567-8901', city: 'Davao City', orders: 12, totalSpent: 98750, status: 'inactive', type: 'regular' }
            ];

            // ==================== DASHBOARD DATA ====================
            const dashboardData = {
                stats: {
                    products: 2543,
                    lowStock: 23,
                    salesToday: 724500,
                    orders: 156,
                    productsTrend: '+12%',
                    lowStockTrend: '-5%',
                    salesTrend: '+8.3%',
                    ordersTrend: '+23'
                },
                recentOrders: [
                    { id: 'INV-2024-1001', customer: 'Juan Dela Cruz', total: 14275, status: 'Completed' },
                    { id: 'INV-2024-1002', customer: 'Maria Santos', total: 5299.99, status: 'Pending' },
                    { id: 'INV-2024-1003', customer: 'Jose Rizal III', total: 32567.50, status: 'Processing' },
                    { id: 'INV-2024-1004', customer: 'Ana Marie Reyes', total: 8456.00, status: 'Completed' },
                    { id: 'INV-2024-1005', customer: 'Carlos Mercado', total: 24932.25, status: 'Completed' }
                ]
            };

            // ==================== PRIVATE METHODS ====================
            function loadFromStorage() {
                const saved = localStorage.getItem('stockSenseSecurity');
                if (saved) {
                    try {
                        security = JSON.parse(saved);
                    } catch (e) {}
                }
            }

            function saveToStorage() {
                localStorage.setItem('stockSenseSecurity', JSON.stringify(security));
            }

            // Initialize
            loadFromStorage();

            // ==================== PUBLIC API ====================
            return {
                // ===== AUTHENTICATION =====
                validateUser: function(username, password) {
                    return users.find(u => u.username === username && u.password === password);
                },

                // ===== SECURITY =====
                getSecurityState: function() {
                    return { ...security };
                },

                recordFailure: function() {
                    security.failures++;
                    
                    if (security.failures >= 6) {
                        security.permanentlyLocked = true;
                        security.permanentLockTime = new Date().toISOString();
                        security.stage = 4;
                        security.lockedUntil = null;
                        saveToStorage();
                        return { locked: true, permanent: true, failures: security.failures };
                    }
                    
                    if (security.failures >= 3 && security.failures <= 5) {
                        security.stage = security.failures - 2;
                        const minutes = [0.5, 0.5, 1][security.stage - 1];
                        const lockTime = new Date(Date.now() + minutes * 60 * 1000);
                        security.lockedUntil = lockTime.toISOString();
                        saveToStorage();
                        return { locked: true, permanent: false, stage: security.stage, lockUntil: security.lockedUntil };
                    }
                    
                    saveToStorage();
                    return { locked: false, failures: security.failures };
                },

                checkLocked: function() {
                    if (security.permanentlyLocked) {
                        return { locked: true, permanent: true, lockTime: security.permanentLockTime };
                    }
                    if (!security.lockedUntil) return { locked: false };
                    if (new Date() < new Date(security.lockedUntil)) {
                        return { locked: true, permanent: false, stage: security.stage, lockUntil: security.lockedUntil };
                    }
                    security.lockedUntil = null;
                    security.stage = 0;
                    saveToStorage();
                    return { locked: false };
                },

                resetSecurity: function() {
                    security = { failures: 0, stage: 0, lockedUntil: null, permanentlyLocked: false, permanentLockTime: null };
                    saveToStorage();
                },

                // ===== SESSION MANAGEMENT =====
                createSession: function(user) {
                    const session = {
                        username: user.username,
                        role: user.role,
                        employeeId: user.employeeId,
                        name: user.name,
                        loginTime: new Date().toISOString()
                    };
                    sessionStorage.setItem('stockSenseUser', JSON.stringify(session));
                    return session;
                },

                getSession: function() {
                    const session = sessionStorage.getItem('stockSenseUser');
                    return session ? JSON.parse(session) : null;
                },

                destroySession: function() {
                    sessionStorage.removeItem('stockSenseUser');
                },

                // ===== DATA ACCESS METHODS =====
                getInventory: function() {
                    return inventory;
                },

                getSales: function() {
                    return sales;
                },

                getCustomers: function() {
                    return customers;
                },

                // ===== DASHBOARD DATA =====
                getDashboardStats: function() {
                    return { ...dashboardData.stats };
                },

                getRecentOrders: function(limit = 5) {
                    return dashboardData.recentOrders.slice(0, limit);
                },

                // ===== UTILITIES =====
                formatCurrency: function(amount) {
                    if (amount === undefined || amount === null) return '₱0.00';
                    return '₱' + amount.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                },

                getStatusBadge: function(status) {
                    const colors = {
                        'Completed': 'bg-success bg-opacity-10 text-success',
                        'Pending': 'bg-warning bg-opacity-10 text-warning',
                        'Processing': 'bg-info bg-opacity-10 text-info'
                    };
                    return `<span class="badge ${colors[status] || 'bg-secondary bg-opacity-10 text-secondary'} px-3 py-2 rounded-pill">${status}</span>`;
                },

                getStatusClass: function(stock) {
                    if (stock <= 0) return 'status-outofstock';
                    if (stock < 20) return 'status-lowstock';
                    return 'status-instock';
                },

                getStatusText: function(stock) {
                    if (stock <= 0) return 'Out of Stock';
                    if (stock < 20) return 'Low Stock';
                    return 'In Stock';
                }
            };
        })();

        // Make it globally available
        window.StockSenseAPI = StockSenseAPI;
        console.log('✅ StockSense API ready');

        // ==========================================
        // PAGE SPECIFIC CODE
        // ==========================================
        
        // Check session
        const session = StockSenseAPI.getSession();
        console.log('Current session:', session);
        
        if (!session) {
            console.log('No session, redirecting to login');
            window.location.href = 'login.html';
        }
        
        const isAdmin = session ? session.role === 'admin' : false;
        const isStaff = session ? session.role === 'staff' : false;
    </script>
    
    <div id="salesApp">
        <div class="d-flex justify-content-center align-items-center" style="min-height: 400px;">
            <div class="text-center">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-secondary">Loading sales data...</p>
            </div>
        </div>
    </div>

    <script>
        // Main page code
        const SalesPage = {
            session: null,
            isAdmin: false,
            isStaff: false,
            
            init: function() {
                console.log('SalesPage.init() called');
                
                this.session = StockSenseAPI.getSession();
                console.log('Session in init:', this.session);
                
                if (!this.session) {
                    console.log('No session, redirecting to login');
                    window.location.href = 'login.html';
                    return;
                }
                
                this.isAdmin = this.session.role === 'admin';
                this.isStaff = this.session.role === 'staff';
                
                console.log('isAdmin:', this.isAdmin, 'isStaff:', this.isStaff);
                this.render();
            },
            
            render: function() {
                console.log('SalesPage.render() called');
                
                // Get sales data from API
                const sales = StockSenseAPI.getSales();
                console.log('Sales data:', sales);

                // Calculate totals
                const totalSales = sales.length;
                const totalRevenue = sales.reduce((sum, s) => sum + s.total, 0);
                const todaySales = sales.filter(s => s.date === '2024-02-28').length;
                const todayRevenue = sales.filter(s => s.date === '2024-02-28').reduce((sum, s) => sum + s.total, 0);

                console.log('Stats:', { totalSales, totalRevenue, todaySales, todayRevenue });

                const dashboardLink = this.isAdmin ? 'admin-dashboard.html' : 'staff-dashboard.html';
                const bannerClass = this.isAdmin ? 'admin-banner' : 'staff-banner';
                const themeClass = this.isStaff ? 'staff-theme' : '';
                const bgGradient = this.isAdmin ? 
                    'bg-primary bg-gradient' : 
                    'bg-success bg-gradient';

                const html = `
                    <!-- Security Banner -->
                    <div class="security-banner ${bannerClass} d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-shield-check fs-5"></i>
                            <span>Sales | ${this.session.name} (${this.isAdmin ? 'Admin' : 'Staff'})</span>
                        </div>
                        <button onclick="SalesPage.logout()" class="btn btn-link text-white p-0 text-decoration-none small opacity-75">Logout</button>
                    </div>

                    <!-- Top Navigation -->
                    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top ${themeClass}">
                        <div class="container">
                            <a class="navbar-brand d-flex align-items-center gap-2" href="${dashboardLink}">
                                <div class="${bgGradient} rounded-3 p-2 text-white">
                                    <i class="bi bi-boxes fs-4"></i>
                                </div>
                                <span class="fw-bold text-dark fs-4">StockSense PH</span>
                            </a>
                            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                                <span class="navbar-toggler-icon"></span>
                            </button>
                            <div class="collapse navbar-collapse" id="navbarNav">
                                <ul class="navbar-nav ms-auto">
                                    <li class="nav-item"><a href="${dashboardLink}" class="nav-link-custom">Dashboard</a></li>
                                    <li class="nav-item"><a href="inventory.html" class="nav-link-custom">Inventory</a></li>
                                    <li class="nav-item"><a href="#" class="nav-link-custom active">Sales</a></li>
                                    ${this.isAdmin ? `
                                        <li class="nav-item"><a href="customers.html" class="nav-link-custom">Customers</a></li>
                                        <li class="nav-item"><a href="reports.html" class="nav-link-custom">Reports</a></li>
                                        <li class="nav-item"><a href="settings.html" class="nav-link-custom">Settings</a></li>
                                    ` : ''}
                                </ul>
                            </div>
                        </div>
                    </nav>

                    <!-- Main Content -->
                    <main class="container py-4 ${themeClass}">
                        <!-- Header -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h2 class="fw-bold mb-1">Sales Transactions</h2>
                                <p class="text-secondary small mb-0">View sales records</p>
                            </div>
                        </div>

                        <!-- Sales Stats -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon ${this.isAdmin ? 'bg-primary bg-opacity-10 text-primary' : 'bg-success bg-opacity-10 text-success'}">
                                                <i class="bi bi-cart"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Transactions</p>
                                                <h4 class="fw-bold mb-0">${totalSales}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon ${this.isAdmin ? 'bg-primary bg-opacity-10 text-primary' : 'bg-success bg-opacity-10 text-success'}">
                                                <i class="bi bi-cash-stack"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Revenue</p>
                                                <h4 class="fw-bold mb-0">${StockSenseAPI.formatCurrency(totalRevenue)}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-info bg-opacity-10 text-info">
                                                <i class="bi bi-calendar-day"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Today's Sales</p>
                                                <h4 class="fw-bold mb-0">${todaySales}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                                                <i class="bi bi-cash"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Today's Revenue</p>
                                                <h4 class="fw-bold mb-0">${StockSenseAPI.formatCurrency(todayRevenue)}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Sales Table -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white border-0 pt-4 pb-0">
                                <h5 class="fw-bold mb-0">Sales History</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Invoice #</th>
                                                <th>Date</th>
                                                <th>Customer</th>
                                                <th>Items</th>
                                                <th>Total</th>
                                                <th>Payment</th>
                                                <th>Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${sales.map(sale => `
                                                <tr>
                                                    <td><span class="${this.isAdmin ? 'text-primary' : 'text-success'} fw-medium">${sale.id}</span></td>
                                                    <td class="small">${sale.date}</td>
                                                    <td>${sale.customer}</td>
                                                    <td>${sale.items}</td>
                                                    <td class="fw-medium">${StockSenseAPI.formatCurrency(sale.total)}</td>
                                                    <td><span class="badge bg-light text-dark">${sale.payment}</span></td>
                                                    <td>${StockSenseAPI.getStatusBadge(sale.status)}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        ${!this.isAdmin ? `
                        <div class="alert alert-warning bg-opacity-10 border-0 mt-4">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            Staff access is view-only. Contact admin to create or edit sales.
                        </div>
                        ` : ''}
                    </main>
                `;
                
                console.log('Setting HTML content');
                document.getElementById('salesApp').innerHTML = html;
                console.log('Page rendered successfully');
            },
            
            logout: function() {
                console.log('Logging out...');
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            }
        };

        // Initialize the page when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM ready, initializing page...');
            SalesPage.init();
        });
    </script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
