<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f1f5f9;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #3b82f6;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }
        .security-banner {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
        }
    </style>
</head>
<body class="min-h-screen">
    <script src="api.js"></script>
    <script>
        // Check session and role
        const session = StockSenseAPI.getSession();
        if (!session) {
            window.location.href = 'login.html';
        } else if (session.role !== 'admin') {
            alert('Access denied. Admin only.');
            window.location.href = 'login.html';
        }
    </script>
    
    <div id="dashboardApp"></div>

    <script>
        const AdminDashboard = {
            session: null,
            
            init: function() {
                this.session = StockSenseAPI.getSession();
                if (!this.session) return;
                this.render();
            },
            
            render: function() {
                const stats = StockSenseAPI.getDashboardStats();
                const orders = StockSenseAPI.getRecentOrders(6);
                
                const html = `
                    <div class="security-banner text-white px-4 py-2 text-sm flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                            <span>Secure Session Active | Role: <span class="font-bold">Admin</span> | ${this.session.name}</span>
                        </div>
                        <button onclick="AdminDashboard.logout()" class="text-white/80 hover:text-white text-xs underline">Logout</button>
                    </div>

                    <nav class="bg-white shadow-sm sticky top-0 z-40">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div class="flex justify-between h-16">
                                <div class="flex items-center">
                                    <div class="flex-shrink-0 flex items-center gap-2">
                                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white">
                                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                                            </svg>
                                        </div>
                                        <span class="text-xl font-bold text-slate-800">StockSense PH</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class="text-sm">${this.session.name} (Admin)</div>
                                    <button onclick="AdminDashboard.logout()" class="bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-lg text-sm">Logout</button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <h2 class="text-2xl font-bold text-slate-800 mb-6">Admin Dashboard</h2>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                            <div class="card-hover bg-white rounded-2xl p-6 shadow-sm">
                                <div class="text-3xl mb-2">📦</div>
                                <h3 class="text-2xl font-bold">${stats.products}</h3>
                                <p class="text-slate-500">Total Products <span class="text-emerald-600 text-xs ml-2">${stats.productsTrend}</span></p>
                            </div>
                            <div class="card-hover bg-white rounded-2xl p-6 shadow-sm">
                                <div class="text-3xl mb-2">⚠️</div>
                                <h3 class="text-2xl font-bold">${stats.lowStock}</h3>
                                <p class="text-slate-500">Low Stock <span class="text-amber-600 text-xs ml-2">${stats.lowStockTrend}</span></p>
                            </div>
                            <div class="card-hover bg-white rounded-2xl p-6 shadow-sm">
                                <div class="text-3xl mb-2">₱</div>
                                <h3 class="text-2xl font-bold">${StockSenseAPI.formatCurrency(stats.salesToday)}</h3>
                                <p class="text-slate-500">Today's Sales <span class="text-emerald-600 text-xs ml-2">${stats.salesTrend}</span></p>
                            </div>
                            <div class="card-hover bg-white rounded-2xl p-6 shadow-sm">
                                <div class="text-3xl mb-2">📋</div>
                                <h3 class="text-2xl font-bold">${stats.orders}</h3>
                                <p class="text-slate-500">Total Orders <span class="text-purple-600 text-xs ml-2">${stats.ordersTrend}</span></p>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-sm p-6">
                            <h3 class="text-lg font-bold mb-4">Recent Orders</h3>
                            <table class="w-full">
                                <thead>
                                    <tr><th class="text-left p-2">Order</th><th class="text-left p-2">Customer</th><th class="text-left p-2">Total</th><th class="text-left p-2">Status</th></tr>
                                </thead>
                                <tbody>
                                    ${orders.map(o => `<tr><td class="p-2">${o.id}</td><td class="p-2">${o.customer}</td><td class="p-2">${StockSenseAPI.formatCurrency(o.total)}</td><td class="p-2">${StockSenseAPI.getStatusBadge(o.status)}</td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </main>
                `;
                document.getElementById('dashboardApp').innerHTML = html;
            },
            
            logout: function() {
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            }
        };

        AdminDashboard.init();
    </script>
</body>
</html>
