<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Customers</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        .nav-link-custom {
            position: relative;
            color: #64748b;
            font-weight: 500;
            padding: 0.5rem 0.25rem;
            margin: 0 0.75rem;
            text-decoration: none;
        }
        .nav-link-custom:hover {
            color: #0d6efd;
        }
        .nav-link-custom.active {
            color: #0d6efd;
        }
        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }
        .security-banner {
            background: linear-gradient(135deg, #0b5e9e 0%, #084298 100%);
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.5rem;
        }
        .badge-active { 
            background-color: #d1fae5; 
            color: #065f46; 
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-inactive { 
            background-color: #f1f5f9; 
            color: #475569; 
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-vip { 
            background-color: #f3e8ff; 
            color: #7e22ce; 
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-regular { 
            background-color: #dbeafe; 
            color: #1e40af; 
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>
    <script src="api.js"></script>
    <!-- INLINE API - Everything is self-contained -->
    <script>
        // ==========================================
        // STOCKSENSE API - COMPLETE SELF-CONTAINED
        // ==========================================
        
        // Create the API object
        
        

        // ==========================================
        // PAGE SPECIFIC CODE
        // ==========================================
        
        // Check session
        const session = StockSenseAPI.getSession();
        console.log('Current session:', session);
        
        if (!session) {
            console.log('No session, redirecting to login');
            window.location.href = 'login.html';
        }
        
        // Staff cannot access customers page
        if (session && session.role === 'staff') {
            console.log('Staff access denied, redirecting to staff dashboard');
            alert('Access denied. Admins only.');
            window.location.href = 'staff-dashboard.html';
        }
        
        const isAdmin = session ? session.role === 'admin' : false;
    </script>
    
    <div id="customersApp">
        <div class="d-flex justify-content-center align-items-center" style="min-height: 400px;">
            <div class="text-center">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-secondary">Loading customers...</p>
            </div>
        </div>
    </div>

    <script>
        // Main page code
        const CustomersPage = {
            session: null,
            isAdmin: false,
            
            init: async function() {
                console.log('CustomersPage.init() called');
                
                this.session = StockSenseAPI.getSession();
                console.log('Session in init:', this.session);
                
                if (!this.session) {
                    console.log('No session, redirecting to login');
                    window.location.href = 'login.html';
                    return;
                }
                
                this.isAdmin = this.session.role === 'admin';
                console.log('isAdmin:', this.isAdmin);
                
                await this.render();
            },
            
            render: async function() {
                console.log('CustomersPage.render() called');
                
                // Get customer data from API
                const customers = await StockSenseAPI.getCustomers();
                console.log('Customers data:', customers);

                const stats = {
                    total: customers.length,
                    active: customers.filter(c => c.status === 'active').length,
                    vip: customers.filter(c => c.type === 'vip').length,
                    totalRevenue: customers.reduce((sum, c) => sum + c.totalSpent, 0)
                };

                console.log('Stats:', stats);

                const html = `
                    <!-- Security Banner -->
                    <div class="security-banner d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-shield-check fs-5"></i>
                            <span>Customers | ${this.session.name} (Admin)</span>
                        </div>
                        <button onclick="CustomersPage.logout()" class="btn btn-link text-white p-0 text-decoration-none small opacity-75">Logout</button>
                    </div>

                    <!-- Top Navigation -->
                    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
                        <div class="container">
                            <a class="navbar-brand d-flex align-items-center gap-2" href="admin-dashboard.html">
                                <div class="bg-primary bg-gradient rounded-3 p-2 text-white">
                                    <i class="bi bi-boxes fs-4"></i>
                                </div>
                                <span class="fw-bold text-dark fs-4">StockSense PH</span>
                            </a>
                            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                                <span class="navbar-toggler-icon"></span>
                            </button>
                            <div class="collapse navbar-collapse" id="navbarNav">
                                <ul class="navbar-nav ms-auto">
                                    <li class="nav-item"><a href="admin-dashboard.html" class="nav-link-custom">Dashboard</a></li>
                                    <li class="nav-item"><a href="inventory.html" class="nav-link-custom">Inventory</a></li>
                                    <li class="nav-item"><a href="sales.html" class="nav-link-custom">Sales</a></li>
                                    <li class="nav-item"><a href="#" class="nav-link-custom active">Customers</a></li>
                                    <li class="nav-item"><a href="reports.html" class="nav-link-custom">Reports</a></li>
                                    <li class="nav-item"><a href="settings.html" class="nav-link-custom">Settings</a></li>
                                </ul>
                            </div>
                        </div>
                    </nav>

                    <!-- Main Content -->
                    <main class="container py-4">
                        <!-- Header -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h2 class="fw-bold mb-1">Customer Management</h2>
                                <p class="text-secondary small mb-0">Manage your customer database</p>
                            </div>
                        </div>

                        <!-- Customer Stats -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                                <i class="bi bi-people"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Customers</p>
                                                <h4 class="fw-bold mb-0">${stats.total}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-success bg-opacity-10 text-success">
                                                <i class="bi bi-check-circle"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Active</p>
                                                <h4 class="fw-bold mb-0">${stats.active}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon" style="background-color: #f3e8ff; color: #7e22ce;">
                                                <i class="bi bi-star-fill"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">VIP Customers</p>
                                                <h4 class="fw-bold mb-0">${stats.vip}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                                                <i class="bi bi-cash"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Revenue</p>
                                                <h4 class="fw-bold mb-0">${StockSenseAPI.formatCurrency(stats.totalRevenue)}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Customers Table -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white border-0 pt-4 pb-0">
                                <h5 class="fw-bold mb-0">Customer List</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Customer</th>
                                                <th>Contact</th>
                                                <th>Location</th>
                                                <th>Orders</th>
                                                <th>Total Spent</th>
                                                <th>Status</th>
                                                <th>Type</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${customers.map(customer => `
                                                <tr>
                                                    <td class="fw-medium">${customer.name}</td>
                                                    <td>
                                                        <div class="small">${customer.email}</div>
                                                        <div class="small text-secondary">${customer.phone}</div>
                                                    </td>
                                                    <td class="small">${customer.city}</td>
                                                    <td class="fw-medium">${customer.orders}</td>
                                                    <td class="fw-medium">${StockSenseAPI.formatCurrency(customer.totalSpent)}</td>
                                                    <td>
                                                        <span class="${customer.status === 'active' ? 'badge-active' : 'badge-inactive'}">
                                                            ${customer.status}
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <span class="${customer.type === 'vip' ? 'badge-vip' : 'badge-regular'}">
                                                            ${customer.type}
                                                        </span>
                                                    </td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                `;
                
                console.log('Setting HTML content');
                document.getElementById('customersApp').innerHTML = html;
                console.log('Page rendered successfully');
            },
            
            logout: async function() {
                console.log('Logging out...');
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            }
        };

        // Initialize the page when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM ready, initializing page...');
            CustomersPage.init();
        });
    </script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
