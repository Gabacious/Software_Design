<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f1f5f9;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .security-banner {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
        }
    </style>
</head>
<body class="min-h-screen">
    <script src="api.js"></script>
    <script>
        // Check session and role
        const session = StockSenseAPI.getSession();
        if (!session) {
            window.location.href = 'login.html';
        } else if (session.role !== 'staff') {
            alert('Access denied. Staff only.');
            window.location.href = 'login.html';
        }
    </script>
    
    <div id="dashboardApp"></div>

    <script>
        const StaffDashboard = {
            session: null,
            
            init: function() {
                this.session = StockSenseAPI.getSession();
                if (!this.session) return;
                this.render();
            },
            
            render: function() {
                const stats = StockSenseAPI.getDashboardStats();
                const orders = StockSenseAPI.getRecentOrders(6);
                
                const html = `
                    <div class="security-banner text-white px-4 py-2 text-sm">
                        <div class="text-center">Staff Access - View Only | ${this.session.name}</div>
                    </div>

                    <nav class="bg-white shadow-sm sticky top-0 z-40">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div class="flex justify-between h-16">
                                <div class="flex items-center">
                                    <div class="flex-shrink-0 flex items-center gap-2">
                                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-600 to-teal-600 flex items-center justify-center text-white">
                                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                                            </svg>
                                        </div>
                                        <span class="text-xl font-bold text-slate-800">StockSense PH</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class="text-sm">${this.session.name} (Staff)</div>
                                    <button onclick="StaffDashboard.logout()" class="bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-lg text-sm">Logout</button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <h2 class="text-2xl font-bold text-slate-800 mb-6">Staff Dashboard</h2>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                            <div class="card-hover bg-white rounded-2xl p-6 shadow-sm">
                                <div class="text-3xl mb-2">📦</div>
                                <h3 class="text-2xl font-bold">${stats.products}</h3>
                                <p class="text-slate-500">Total Products</p>
                            </div>
                            <div class="card-hover bg-white rounded-2xl p-6 shadow-sm">
                                <div class="text-3xl mb-2">⚠️</div>
                                <h3 class="text-2xl font-bold">${stats.lowStock}</h3>
                                <p class="text-slate-500">Low Stock</p>
                            </div>
                            <div class="card-hover bg-white rounded-2xl p-6 shadow-sm">
                                <div class="text-3xl mb-2">₱</div>
                                <h3 class="text-2xl font-bold">${StockSenseAPI.formatCurrency(stats.salesToday)}</h3>
                                <p class="text-slate-500">Today's Sales</p>
                            </div>
                            <div class="card-hover bg-white rounded-2xl p-6 shadow-sm">
                                <div class="text-3xl mb-2">📋</div>
                                <h3 class="text-2xl font-bold">${stats.orders}</h3>
                                <p class="text-slate-500">Total Orders</p>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-sm p-6">
                            <h3 class="text-lg font-bold mb-4">Recent Orders (View Only)</h3>
                            <table class="w-full">
                                <thead>
                                    <tr><th class="text-left p-2">Order</th><th class="text-left p-2">Customer</th><th class="text-left p-2">Total</th><th class="text-left p-2">Status</th></tr>
                                </thead>
                                <tbody>
                                    ${orders.map(o => `<tr><td class="p-2">${o.id}</td><td class="p-2">${o.customer}</td><td class="p-2">${StockSenseAPI.formatCurrency(o.total)}</td><td class="p-2">${StockSenseAPI.getStatusBadge(o.status)}</td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </main>
                `;
                document.getElementById('dashboardApp').innerHTML = html;
            },
            
            logout: function() {
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            }
        };

        StaffDashboard.init();
    </script>
</body>
</html>
