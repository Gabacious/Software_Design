<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Staff Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }
        .nav-link-custom {
            position: relative;
            color: #64748b;
            font-weight: 500;
            padding: 0.5rem 0.25rem;
            margin: 0 0.75rem;
        }
        .nav-link-custom:hover {
            color: #198754;
        }
        .nav-link-custom.active {
            color: #198754;
        }
        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #198754;
        }
        .security-banner {
            background: linear-gradient(135deg, #146c43 0%, #0f5132 100%);
            color: white;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <script src="api.js"></script>
    <script>
        // Check session and role
        const session = StockSenseAPI.getSession();
        if (!session) {
            window.location.href = 'login.html';
        } else if (session.role !== 'staff') {
            alert('Access denied. Staff only.');
            window.location.href = 'login.html';
        }
    </script>
    
    <div id="dashboardApp"></div>

    <script>
        const StaffDashboard = {
            session: null,
            
            init: async function() {
                this.session = StockSenseAPI.getSession();
                if (!this.session) return;
                await this.render();
            },
            
            render: async function() {
                const stats = await StockSenseAPI.getDashboardStats();
                const orders = await StockSenseAPI.getRecentOrders(6);
                
                const html = `
                    <!-- Security Banner -->
                    <div class="security-banner px-4 py-2 small d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-shield-check fs-5"></i>
                            <span>Staff Access - View Only | ${this.session.name}</span>
                        </div>
                        <button onclick="StaffDashboard.logout()" class="btn btn-link text-white p-0 text-decoration-none small opacity-75 hover-opacity-100">Logout</button>
                    </div>

                    <!-- Top Navigation -->
                    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
                        <div class="container">
                            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                                <div class="bg-success bg-gradient rounded-3 p-2 text-white">
                                    <i class="bi bi-boxes fs-4"></i>
                                </div>
                                <span class="fw-bold text-dark fs-4">StockSense PH</span>
                            </a>
                            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                                <span class="navbar-toggler-icon"></span>
                            </button>
                            <div class="collapse navbar-collapse" id="navbarNav">
                                <ul class="navbar-nav ms-auto">
                                    <li class="nav-item"><a href="#" class="nav-link-custom active">Dashboard</a></li>
                                    <li class="nav-item"><a href="inventory.html" class="nav-link-custom">Inventory</a></li>
                                    <li class="nav-item"><a href="sales.html" class="nav-link-custom">Sales</a></li>
                                </ul>
                            </div>
                        </div>
                    </nav>

                    <!-- Main Content -->
                    <main class="container py-4">
                        <h2 class="fw-bold mb-4">Staff Dashboard</h2>

                        <!-- Stats Cards -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-3">
                                <div class="card card-hover border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                                <i class="bi bi-box-seam"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Products</p>
                                                <h3 class="fw-bold mb-0">${stats.products}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card card-hover border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                                                <i class="bi bi-exclamation-triangle"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Low Stock</p>
                                                <h3 class="fw-bold mb-0">${stats.lowStock}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card card-hover border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-success bg-opacity-10 text-success">
                                                <i class="bi bi-cash"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Today's Sales</p>
                                                <h3 class="fw-bold mb-0">${StockSenseAPI.formatCurrency(stats.salesToday)}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card card-hover border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-info bg-opacity-10 text-info">
                                                <i class="bi bi-cart-check"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Orders</p>
                                                <h3 class="fw-bold mb-0">${stats.orders}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Recent Orders -->
                        <div class="row g-4 mb-4">
                            <div class="col-12">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-header bg-white border-0 pt-4 pb-0">
                                        <h5 class="fw-bold mb-0">Recent Orders (View Only)</h5>
                                    </div>
                                    <div class="card-body">
                                        <div class="table-responsive">
                                            <table class="table table-hover align-middle">
                                                <thead class="table-light">
                                                    <tr>
                                                        <th>Order ID</th>
                                                        <th>Customer</th>
                                                        <th>Total</th>
                                                        <th>Status</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    ${orders.map(o => `
                                                        <tr>
                                                            <td><span class="font-monospace">${o.id}</span></td>
                                                            <td>${o.customer}</td>
                                                            <td class="fw-medium">${StockSenseAPI.formatCurrency(o.total)}</td>
                                                            <td>${StockSenseAPI.getStatusBadge(o.status)}</td>
                                                        </tr>
                                                    `).join('')}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Staff Notice -->
                        <div class="alert alert-warning bg-opacity-10 border-0 mb-4">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            Staff access is view-only. Contact admin to make changes.
                        </div>
                        
                        <!-- Quick Access Cards -->
                        <div class="row g-4">
                            <div class="col-md-6">
                                <a href="inventory.html" class="text-decoration-none">
                                    <div class="card border-0 shadow-sm card-hover">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                                    <i class="bi bi-box-seam"></i>
                                                </div>
                                                <div>
                                                    <h5 class="fw-bold mb-1">View Inventory</h5>
                                                    <p class="text-secondary mb-0">Check product stock levels</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-6">
                                <a href="sales.html" class="text-decoration-none">
                                    <div class="card border-0 shadow-sm card-hover">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="stat-icon bg-success bg-opacity-10 text-success">
                                                    <i class="bi bi-cash"></i>
                                                </div>
                                                <div>
                                                    <h5 class="fw-bold mb-1">View Sales</h5>
                                                    <p class="text-secondary mb-0">Monitor sales transactions</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </main>
                `;
                document.getElementById('dashboardApp').innerHTML = html;
            },
            
            logout: async function() {
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            }
        };

        StaffDashboard.init();
    </script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
