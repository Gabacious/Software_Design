<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Staff Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }

        #mainContent {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-link-custom {
            position: relative;
            color: #64748b;
            font-weight: 500;
            padding: 0.5rem 0.25rem;
            margin: 0 0.75rem;
        }

        .nav-link-custom:hover {
            color: #198754;
        }

        .nav-link-custom.active {
            color: #198754;
        }

        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #198754;
        }

        .security-banner {
            background: linear-gradient(135deg, #146c43 0%, #0f5132 100%);
            color: white;
        }

        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.5rem;
        }

        .noti-badge {
            padding: 0.35em 0.5em;
            line-height: 1;
        }

        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.2) !important;
            border-bottom: 3px solid white !important;
            opacity: 1 !important;
        }

        .nav-link:not(.active) {
            opacity: 0.7;
        }

        .dropdown-toggle::after {
            display: none !important;
        }
    </style>
</head>

<body>
    <script src="api.js"></script>
    <script>
        // Check session and role
        const session = StockSenseAPI.getSession();
        if (!session) {
            window.location.href = 'login.html';
        } else if (session.role !== 'staff') {
            alert('Access denied. Staff only.');
            window.location.href = 'login.html';
        }
    </script>

    <!-- Static Security Banner -->
    <div class="security-banner px-4 py-2 small d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-shield-check fs-5"></i>
            <span>Supplier Procurement | Role: <span class="fw-bold">Staff</span> | <span id="userNamePlaceholder">...</span></span>
        </div>
        <button onclick="StaffDashboard.logout()"
            class="btn btn-link text-white p-0 text-decoration-none small opacity-75">Logout</button>
    </div>

    <!-- Static Top Navigation -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="staff-dashboard.html">
                <div class="bg-success bg-gradient rounded-3 p-2 text-white">
                    <i class="bi bi-boxes fs-4"></i>
                </div>
                <span class="fw-bold text-dark fs-4">StockSense PH</span>
            </a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <!-- Notification Bell -->
                <div class="dropdown me-3">
                    <a class="nav-link-custom position-relative dropdown-toggle p-2" href="#" id="notiDropdown"
                        role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-bell fs-5"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger noti-badge"
                            style="font-size: 0.6rem; display: none;">
                            0
                        </span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end shadow border-0 py-0 overflow-hidden"
                        aria-labelledby="notiDropdown" style="width: 280px; margin-top: 1rem;">
                        <div class="p-2 border-bottom bg-light">
                            <h6 class="mb-0 fw-bold small px-2">Notifications</h6>
                        </div>
                        <div id="notificationList" style="max-height: 300px; overflow-y: auto;">
                            <div class="p-3 text-center text-secondary small">Loading...</div>
                        </div>
                    </div>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="staff-dashboard.html" class="nav-link-custom active">Dashboard</a>
                    </li>
                    <li class="nav-item"><a href="inventory.html" class="nav-link-custom">Inventory</a></li>
                    <li class="nav-item"><a href="sales.html" class="nav-link-custom">Sales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="dashboardApp">
        <div class="d-flex justify-content-center align-items-center" style="min-height: 400px;">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <!-- POS Modal -->
    <div class="modal fade" id="posModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-success text-white border-0 d-flex flex-column align-items-start p-0">
                    <div class="d-flex justify-content-between w-100 p-3">
                        <h5 class="modal-title fw-bold mb-0"><i class="bi bi-cart-fill me-2"></i>POS & Order Management</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <ul class="nav nav-tabs border-0 w-100 px-3" id="posTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active text-white border-0 bg-transparent fw-bold" id="new-sale-tab" data-bs-toggle="tab" data-bs-target="#new-sale" type="button" role="tab">Create New Sale</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link text-white border-0 bg-transparent fw-bold" id="order-monitor-tab" data-bs-toggle="tab" data-bs-target="#order-monitor" type="button" role="tab" onclick="StaffDashboard.refreshOrderMonitor()">Order Monitor</button>
                        </li>
                    </ul>
                </div>
                <div class="modal-body p-0">
                    <div class="tab-content" id="posTabContent">
                        <!-- Create New Sale Tab -->
                        <div class="tab-pane fade show active" id="new-sale" role="tabpanel">
                    <div class="row g-0">
                        <!-- Product Selection -->
                        <div class="col-lg-8 border-end p-4">
                            <div class="input-group mb-4 border rounded shadow-sm">
                                <span class="input-group-text bg-white border-0"><i class="bi bi-search text-secondary"></i></span>
                                <input type="text" id="posProductSearch" class="form-control border-0" placeholder="Search products by name or category..." oninput="StaffDashboard.filterPOSProducts()">
                            </div>
                            
                            <div class="row g-3" id="posProductGrid" style="max-height: 500px; overflow-y: auto;">
                                <!-- Products will be listed here as cards -->
                            </div>
                        </div>
                        
                        <!-- Cart & Checkout -->
                        <div class="col-lg-4 bg-light p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-bold mb-0">Order Summary</h6>
                                <button class="btn btn-sm btn-outline-danger" onclick="StaffDashboard.clearCart()">Clear</button>
                            </div>
                            
                            <div id="posCartList" class="mb-4" style="min-height: 200px; max-height: 300px; overflow-y: auto;">
                                <!-- Cart items -->
                            </div>
                            
                            <div class="border-top pt-3 mb-4">
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-secondary">Subtotal</span>
                                    <span class="fw-bold" id="posSubtotal">₱0.00</span>
                                </div>
                                <div class="d-flex justify-content-between fs-4 fw-bold text-success">
                                    <span>Total</span>
                                    <span id="posTotal">₱0.00</span>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-secondary">Customer Name</label>
                                <input type="text" id="posCustomer" class="form-control border-0 shadow-sm" placeholder="Walk-in Customer">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-secondary">Payment Method</label>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <input type="radio" class="btn-check" name="paymentMethod" id="payCash" value="Cash" checked>
                                        <label class="btn btn-outline-success w-100 py-3" for="payCash">
                                            <i class="bi bi-cash-stack d-block mb-1 fs-4"></i> Cash
                                        </label>
                                    </div>
                                    <div class="col-6">
                                        <input type="radio" class="btn-check" name="paymentMethod" id="payOnline" value="Online Payment">
                                        <label class="btn btn-outline-primary w-100 py-3" for="payOnline">
                                            <i class="bi bi-credit-card d-block mb-1 fs-4"></i> Online
                                        </label>
                                    </div>
                                </div>
                            </div>
                            
                            <button class="btn btn-success w-100 py-3 fw-bold shadow" onclick="StaffDashboard.processCheckout()">
                                PLACE ORDER & PRINT RECEIPT
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Order Monitor Tab -->
                <div class="tab-pane fade" id="order-monitor" role="tabpanel">
                    <div class="p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h6 class="fw-bold mb-0">Active & Recent Orders</h6>
                            <button class="btn btn-sm btn-outline-success" onclick="StaffDashboard.refreshOrderMonitor()">
                                <i class="bi bi-arrow-clockwise me-1"></i> Refresh
                            </button>
                        </div>
                        
                        <div class="table-responsive" style="max-height: 500px;">
                            <table class="table table-hover align-middle border">
                                <thead class="table-light">
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Customer</th>
                                        <th>Total</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="posOrderMonitorList">
                                    <!-- Orders will be listed here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- Notification Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100" id="toastContainer"></div>

    <script>
        const StaffDashboard = {
            session: null,

            init: async function () {
                this.session = StockSenseAPI.getSession();
                if (!this.session) return;
                await this.render();

                this.inventory = [];
                this.cart = [];

                // Check for low stock alerts on load
                setTimeout(() => StockSenseAPI.checkLowStock(), 1000);
            },

            render: async function () {
                const stats = await StockSenseAPI.getDashboardStats();
                const orders = await StockSenseAPI.getRecentOrders(6);
                this.inventory = await StockSenseAPI.getInventory();
                this.cart = [];

                // Update session info
                document.getElementById('userNamePlaceholder').textContent = this.session.name;

                const html = `
                    <!-- Main Content -->
                    <main class="container py-4" id="mainContent">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h2 class="fw-bold mb-1">Staff Dashboard</h2>
                                <p class="text-secondary small mb-0">Welcome back, ${this.session.name}</p>
                            </div>
                            <button class="btn btn-success d-flex align-items-center gap-2 px-4 shadow-sm py-3 fw-bold" onclick="StaffDashboard.openPOS()">
                                <i class="bi bi-cart-plus fs-4"></i>
                                <span>OPEN POS SYSTEM</span>
                            </button>
                        </div>

                        <!-- Stats Cards -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-3">
                                <div class="card card-hover border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                                <i class="bi bi-box-seam"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Products</p>
                                                <h3 class="fw-bold mb-0">${stats.products}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card card-hover border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                                                <i class="bi bi-exclamation-triangle"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Low Stock</p>
                                                <h3 class="fw-bold mb-0">${stats.lowStock}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card card-hover border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-success bg-opacity-10 text-success">
                                                <i class="bi bi-cash"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Today's Sales</p>
                                                <h3 class="fw-bold mb-0">${StockSenseAPI.formatCurrency(stats.salesToday)}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card card-hover border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-info bg-opacity-10 text-info">
                                                <i class="bi bi-cart-check"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Orders</p>
                                                <h3 class="fw-bold mb-0">${stats.orders}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Recent Orders -->
                        <div class="row g-4 mb-4">
                            <div class="col-12">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-header bg-white border-0 pt-4 pb-0">
                                        <h5 class="fw-bold mb-0">Recent Orders (View Only)</h5>
                                    </div>
                                    <div class="card-body">
                                        <div class="table-responsive">
                                            <table class="table table-hover align-middle">
                                                <thead class="table-light">
                                                    <tr>
                                                        <th>Order ID</th>
                                                        <th>Reference</th>
                                                        <th>Total</th>
                                                        <th>Status</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    ${orders.map(o => `
                                                        <tr>
                                                            <td><span class="font-monospace">${o.id}</span></td>
                                                            <td>${o.customer}</td>
                                                            <td class="fw-medium">${StockSenseAPI.formatCurrency(o.total)}</td>
                                                            <td>${StockSenseAPI.getStatusBadge(o.status)}</td>
                                                        </tr>
                                                    `).join('')}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Staff Notice -->
                        <div class="alert alert-warning bg-opacity-10 border-0 mb-4">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            Staff access is view-only. Contact admin to make changes.
                        </div>
                        
                        <!-- Quick Access Cards -->
                        <div class="row g-4">
                            <div class="col-md-6">
                                <a href="inventory.html" class="text-decoration-none">
                                    <div class="card border-0 shadow-sm card-hover">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                                    <i class="bi bi-box-seam"></i>
                                                </div>
                                                <div>
                                                    <h5 class="fw-bold mb-1">View Inventory</h5>
                                                    <p class="text-secondary mb-0">Check product stock levels</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-6">
                                <a href="sales.html" class="text-decoration-none">
                                    <div class="card border-0 shadow-sm card-hover">
                                        <div class="card-body p-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="stat-icon bg-success bg-opacity-10 text-success">
                                                    <i class="bi bi-cash"></i>
                                                </div>
                                                <div>
                                                    <h5 class="fw-bold mb-1">View Sales</h5>
                                                    <p class="text-secondary mb-0">Monitor sales transactions</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </main>
                `;
                document.getElementById('dashboardApp').innerHTML = html;
            },

            logout: async function () {
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            },

            openPOS: async function () {
                if (!this.inventory || this.inventory.length === 0) {
                    this.inventory = await StockSenseAPI.getInventory();
                }
                const modalEl = document.getElementById('posModal');
                const modal = new bootstrap.Modal(modalEl);
                modal.show();
                this.renderPOSProducts(this.inventory);
            },

            renderPOSProducts: function (products) {
                const grid = document.getElementById('posProductGrid');
                if (!products || products.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center py-5 text-secondary">No products matching your search.</div>';
                    return;
                }
                
                grid.innerHTML = products.map(p => `
                    <div class="col-md-4">
                        <div class="card h-100 border-0 shadow-sm ${p.stock <= 0 ? 'opacity-50' : ''}" 
                             onclick="${p.stock > 0 ? `StaffDashboard.addById(${p.id})` : ''}"
                             style="cursor: ${p.stock > 0 ? 'pointer' : 'not-allowed'}">
                            <div class="card-body p-3">
                                <span class="badge bg-light text-dark border small mb-2">${p.category}</span>
                                <h6 class="fw-bold mb-1 text-truncate small">${p.name}</h6>
                                <p class="text-success fw-bold mb-2 small">${StockSenseAPI.formatCurrency(p.price)}</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="tiny ${p.stock < 10 ? 'text-danger' : 'text-secondary'}" style="font-size:0.7rem;">Stock: ${p.stock}</span>
                                    <div class="btn btn-sm btn-success rounded-circle p-1" style="width:24px; height:24px; display: flex; align-items: center; justify-content: center;">
                                        <i class="bi bi-plus small"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            },

            filterPOSProducts: function () {
                const query = document.getElementById('posProductSearch').value.toLowerCase();
                const filtered = this.inventory.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    p.category.toLowerCase().includes(query)
                );
                this.renderPOSProducts(filtered);
            },

            addById: function (id) {
                const product = this.inventory.find(p => p.id === id);
                if (product) this.addToCart(product);
            },

            addToCart: function (product) {
                const existing = this.cart.find(c => c.product_id === product.id);
                if (existing) {
                    if (existing.quantity >= product.stock) {
                        alert('Insufficient stock available');
                        return;
                    }
                    existing.quantity++;
                    existing.subtotal = existing.quantity * existing.price;
                } else {
                    this.cart.push({
                        product_id: product.id,
                        name: product.name,
                        price: parseFloat(product.price),
                        quantity: 1,
                        subtotal: parseFloat(product.price)
                    });
                }
                this.renderCart();
            },

            renderCart: function () {
                const list = document.getElementById('posCartList');
                if (this.cart.length === 0) {
                    list.innerHTML = '<div class="text-center py-5 text-secondary small">Cart is empty</div>';
                    document.getElementById('posSubtotal').textContent = '₱0.00';
                    document.getElementById('posTotal').textContent = '₱0.00';
                    return;
                }

                list.innerHTML = this.cart.map((item, index) => `
                    <div class="d-flex align-items-center gap-2 mb-2 bg-white p-2 rounded shadow-sm">
                        <div class="flex-grow-1 overflow-hidden">
                            <div class="fw-bold small text-truncate" style="font-size:0.8rem;">${item.name}</div>
                            <div class="tiny text-secondary" style="font-size:0.7rem;">${StockSenseAPI.formatCurrency(item.price)} x ${item.quantity}</div>
                        </div>
                        <div class="d-flex align-items-center gap-1">
                            <button class="btn btn-sm btn-light border p-0" style="width:20px;height:20px;" onclick="StaffDashboard.updateCartQty(${index}, -1)"><i class="bi bi-dash tiny"></i></button>
                            <span class="px-1 small fw-bold" style="font-size:0.8rem;">${item.quantity}</span>
                            <button class="btn btn-sm btn-light border p-0" style="width:20px;height:20px;" onclick="StaffDashboard.updateCartQty(${index}, 1)"><i class="bi bi-plus tiny"></i></button>
                            <button class="btn btn-sm btn-outline-danger border-0 p-0 ms-1" style="width:20px;height:20px;" onclick="StaffDashboard.removeFromCart(${index})"><i class="bi bi-x tiny"></i></button>
                        </div>
                    </div>
                `).join('');

                const total = this.cart.reduce((sum, item) => sum + item.subtotal, 0);
                document.getElementById('posSubtotal').textContent = StockSenseAPI.formatCurrency(total);
                document.getElementById('posTotal').textContent = StockSenseAPI.formatCurrency(total);
            },

            updateCartQty: function (index, delta) {
                const item = this.cart[index];
                const product = this.inventory.find(p => p.id === item.product_id);
                
                if (delta > 0 && item.quantity >= product.stock) {
                    alert('Insufficient stock');
                    return;
                }

                item.quantity += delta;
                if (item.quantity <= 0) {
                    this.cart.splice(index, 1);
                } else {
                    item.subtotal = item.quantity * item.price;
                }
                this.renderCart();
            },

            removeFromCart: function (index) {
                this.cart.splice(index, 1);
                this.renderCart();
            },

            clearCart: function () {
                this.cart = [];
                this.renderCart();
            },

            processCheckout: async function () {
                if (this.cart.length === 0) {
                    alert('Cart is empty');
                    return;
                }

                const total = this.cart.reduce((sum, item) => sum + item.subtotal, 0);
                const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
                const customer = document.getElementById('posCustomer').value || 'Walk-in Customer';

                const saleData = {
                    customer: customer,
                    total: total,
                    itemsCount: this.cart.reduce((sum, item) => sum + item.quantity, 0),
                    payment: paymentMethod,
                    cart: this.cart
                };

                const res = await StockSenseAPI.createSale(saleData);
                if (res.success) {
                    StockSenseAPI.showNotification('Order Placed', `Order #${res.sale_id} is now Pending.`, 'success');
                    // Switch to Monitor tab to show the new order
                    const monitorTab = new bootstrap.Tab(document.getElementById('order-monitor-tab'));
                    monitorTab.show();
                    await this.refreshOrderMonitor();
                    
                    this.cart = [];
                    this.clearCart(); // Reset UI
                    await this.render();
                } else {
                    alert('Checkout failed: ' + res.message);
                }
            },

            refreshOrderMonitor: async function () {
                const list = document.getElementById('posOrderMonitorList');
                list.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-secondary"><div class="spinner-border text-success spinner-border-sm me-2"></div>Loading orders...</td></tr>';
                
                const sales = await StockSenseAPI.getSales();
                // Show last 20 orders
                const recentSales = sales.slice(0, 20);

                if (recentSales.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-secondary">No recent orders found.</td></tr>';
                    return;
                }

                list.innerHTML = recentSales.map(s => `
                    <tr>
                        <td><span class="text-success fw-bold small">${s.id}</span></td>
                        <td class="small">${s.customer}</td>
                        <td class="small fw-medium">${StockSenseAPI.formatCurrency(s.total)}</td>
                        <td>${StockSenseAPI.getStatusBadge(s.status)}</td>
                        <td class="text-end">
                            ${s.status === 'Pending' ? `
                                <div class="d-flex justify-content-end gap-1">
                                    <button class="btn btn-sm btn-success p-1 px-2" onclick="StaffDashboard.updatePOSOrderStatus('${s.id}', 'Completed')" title="Mark as Done">
                                        <i class="bi bi-check2"></i> Done
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger p-1 px-2" onclick="StaffDashboard.updatePOSOrderStatus('${s.id}', 'Cancelled')" title="Cancel">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            ` : '<span class="text-secondary small fst-italic">Finalized</span>'}
                        </td>
                    </tr>
                `).join('');
            },

            updatePOSOrderStatus: async function (id, status) {
                const actionText = status === 'Completed' ? 'complete' : 'cancel';
                if (!confirm(`Are you sure you want to ${actionText} this order?`)) return;

                const res = await StockSenseAPI.updateSaleStatus(id, status);
                if (res.success) {
                    StockSenseAPI.showNotification('Order Updated', `Order ${id} is now ${status}.`, 'success');
                    await this.refreshOrderMonitor();
                    await this.render(); // Update dashboard stats
                } else {
                    alert('Failed to update status: ' + res.message);
                }
            }
        };

        // Initialize the page when DOM is ready
        document.addEventListener('DOMContentLoaded', function () {
            StaffDashboard.init();
        });
    </script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
