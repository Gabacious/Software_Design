<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Secure Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0a1a2f 0%, #1a3b5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .input-field:focus {
            transform: scale(1.02);
            transition: all 0.3s ease;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .lockout-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(220, 53, 69, 0.95);
            border-radius: 1.5rem;
            z-index: 1050;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 2rem;
            backdrop-filter: blur(5px);
        }

        .permanent-lockout-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(153, 27, 27, 0.98);
            border-radius: 1.5rem;
            z-index: 1050;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 2rem;
            border: 4px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
            background-color: #e9ecef;
        }

        .strength-weak {
            background: #dc3545;
            width: 33%;
        }

        .strength-medium {
            background: #fd7e14;
            width: 66%;
        }

        .strength-strong {
            background: #198754;
            width: 100%;
        }

        .countdown-timer {
            font-family: monospace;
            font-size: 2.5rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            display: inline-block;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .logo-box i {
            font-size: 2.5rem;
            color: #6ea8fe;
        }

        .position-relative {
            position: relative;
        }

        .d-none {
            display: none !important;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            position: relative;
        }

        .bg-opacity-20 {
            --bs-bg-opacity: 0.2;
        }

        .lockout-stage {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <script src="api.js"></script>
    <div class="login-container">
        <!-- Login Card Container (relative for overlays) -->
        <div id="loginContainer" class="position-relative">
            <!-- Temporary Lockout Overlay -->
            <div id="lockoutOverlay" class="lockout-overlay d-none">
                <i class="bi bi-shield-lock-fill display-1 mb-4"></i>
                <h3 class="fw-bold mb-2">Account Temporarily Locked</h3>
                <p class="mb-4">Too many failed login attempts.</p>

                <div class="mb-4 text-center">
                    <p class="small opacity-75 mb-2">Time remaining:</p>
                    <div id="countdownTimer" class="countdown-timer">00:00</div>
                </div>
                <p class="small opacity-75 mb-3">Locked since: <span id="lockoutTime"></span></p>
                <button onclick="App.unlockAccount()" class="btn btn-light text-danger fw-semibold px-4 py-2 rounded-3">
                    <i class="bi bi-unlock me-2"></i>Lockout Override (Demo)
                </button>
            </div>

            <!-- Logo Section -->
            <div class="text-center mb-4">
                <div class="logo-box">
                    <i class="bi bi-boxes"></i>
                </div>
                <h1 class="display-6 fw-bold text-white mb-1">StockSense PH</h1>
                <p class="text-white-50">Enterprise Inventory Management</p>
            </div>

            <!-- Login Card -->
            <div class="glass-card">
                <div id="errorContainer" class="alert alert-danger d-none mb-4" role="alert">
                    <div class="d-flex align-items-start">
                        <i class="bi bi-exclamation-circle-fill me-2 mt-1"></i>
                        <div class="flex-grow-1">
                            <span id="errorText"></span>
                            <div id="attemptsWarning" class="small fw-bold mt-2 pt-2 border-top border-danger d-none">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="successContainer" class="alert alert-success d-none mb-4 d-flex align-items-center"
                    role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span id="successText"></span>
                </div>

                <form id="loginForm">
                    <div class="mb-4">
                        <label class="form-label fw-medium text-secondary">Username <span
                                class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-person text-secondary"></i>
                            </span>
                            <input type="text" id="username" class="form-control border-start-0 input-field"
                                placeholder="Enter username" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Password <span
                                class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-lock text-secondary"></i>
                            </span>
                            <input type="password" id="password"
                                class="form-control border-start-0 border-end-0 input-field"
                                placeholder="Enter password" required>
                            <button class="btn btn-outline-secondary border-start-0 bg-white" type="button"
                                onclick="App.togglePassword()">
                                <i id="eyeIcon" class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>


                    <button type="submit" id="loginBtn"
                        class="btn btn-primary w-100 py-3 fw-semibold rounded-3 d-flex align-items-center justify-content-center gap-2">
                        <span id="spinner" class="spinner-border spinner-border-sm d-none" role="status"
                            aria-hidden="true"></span>
                        <span id="btnText">Secure Login</span>
                    </button>
                </form>

                <!-- Test Buttons -->
                <div class="d-flex gap-2 justify-content-center mt-4">
                    <button onclick="testAdminLogin()" class="btn btn-sm btn-primary">
                        Test Admin
                    </button>
                    <button onclick="testStaffLogin()" class="btn btn-sm btn-success">
                        Test Staff
                    </button>
                    <button onclick="clearAllData()" class="btn btn-sm btn-danger">
                        Reset
                    </button>
                </div>

                <div class="mt-4 text-center small text-secondary">
                    <p class="mb-1">Demo: admin / Admin@1234567890abc | staff / Staff@1234567890xyz</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // STOCKSENSE API - Built-in
        // ==========================================

        

        // ==================== APPLICATION ====================
        const App = {
            countdownInterval: null,

            init: async function() {
                console.log('App initializing...');

                // Add form submit handler
                const loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', this.handleLogin.bind(this));
                }

                // Check lock status on page load
                this.checkInitialLockStatus();
            },

            checkInitialLockStatus: async function() {
                const lockStatus = StockSenseAPI.checkLocked();
                console.log('Initial lock status:', lockStatus);

                if (lockStatus.locked && lockStatus.lockUntil) {
                    this.showLockout(
                        lockStatus.lockUntil,
                        lockStatus.remaining
                    );
                } else {
                    // Make sure overlays are hidden
                    this.hideAllOverlays();
                }
            },

            hideAllOverlays: async function() {
                document.getElementById('lockoutOverlay').classList.add('d-none');
                
                const attemptsWarning = document.getElementById('attemptsWarning');
                if (attemptsWarning) {
                    attemptsWarning.textContent = 'Failed attempts: 0/3';
                }

                if (this.countdownInterval) {
                    clearInterval(this.countdownInterval);
                    this.countdownInterval = null;
                }
            },

            togglePassword: async function() {
                const input = document.getElementById('password');
                const icon = document.getElementById('eyeIcon');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bi-eye');
                    icon.classList.add('bi-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bi-eye-slash');
                    icon.classList.add('bi-eye');
                }
            },

            handleLogin: async function (e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                // Hide previous error/success messages
                document.getElementById('errorContainer').classList.add('d-none');
                document.getElementById('successContainer').classList.add('d-none');
                document.getElementById('attemptsWarning').classList.add('d-none');

                if (!username || !password) {
                    document.getElementById('errorText').textContent = 'Please enter both username and password';
                    document.getElementById('errorContainer').classList.remove('d-none');
                    return;
                }

                // Check if locked
                const lockStatus = StockSenseAPI.checkLocked();
                if (lockStatus.locked && lockStatus.lockUntil) {
                    this.showLockout(
                        lockStatus.lockUntil,
                        lockStatus.remaining
                    );
                    return;
                }

                // Show loading spinner
                document.getElementById('spinner').classList.remove('d-none');
                document.getElementById('btnText').textContent = 'Verifying...';
                document.getElementById('loginBtn').disabled = true;

                try {
                    await new Promise(r => setTimeout(r, 500));

                    // Validate user
                    const user = await StockSenseAPI.validateUser(username, password);

                    if (!user) {
                        const result = StockSenseAPI.recordFailure();

                        document.getElementById('errorText').textContent = 'Wrong credentials. Please try again.';
                        document.getElementById('errorContainer').classList.remove('d-none');

                        // Show counter
                        const attemptsWarning = document.getElementById('attemptsWarning');
                        if (attemptsWarning) {
                            attemptsWarning.textContent = `Failed attempts: ${result.failures}/3`;
                            attemptsWarning.classList.remove('d-none');
                        }

                        if (result.locked && result.lockUntil) {
                            this.showLockout(
                                result.lockUntil,
                                result.remaining
                            );
                        }

                        // Reset button
                        document.getElementById('spinner').classList.add('d-none');
                        document.getElementById('btnText').textContent = 'Secure Login';
                        document.getElementById('loginBtn').disabled = false;
                        return;
                    }

                    // Success!
                    StockSenseAPI.resetSecurity();
                    StockSenseAPI.createSession(user);

                    document.getElementById('successText').textContent = 'Login successful! Redirecting...';
                    document.getElementById('successContainer').classList.remove('d-none');

                    // Redirect based on role
                    setTimeout(() => {
                        if (user.role === 'staff') {
                            window.location.href = 'staff-dashboard.html';
                        } else {
                            window.location.href = 'admin-dashboard.html';
                        }
                    }, 1000);
                } catch (err) {
                    console.error('Login error:', err);
                    document.getElementById('errorText').textContent = 'Connection error. Please try again.';
                    document.getElementById('errorContainer').classList.remove('d-none');
                    
                    // Reset button
                    document.getElementById('spinner').classList.add('d-none');
                    document.getElementById('btnText').textContent = 'Secure Login';
                    document.getElementById('loginBtn').disabled = false;
                }
            },

            showLockout: async function(lockUntil, remaining) {
                console.log('Showing lockout:', { lockUntil, remaining });

                // Clear any existing interval
                if (this.countdownInterval) {
                    clearInterval(this.countdownInterval);
                }

                // Show temporary overlay
                document.getElementById('lockoutOverlay').classList.remove('d-none');

                // Update lockout info
                document.getElementById('lockoutTime').textContent = new Date(lockUntil).toLocaleString();

                // Set initial timer display
                if (remaining && remaining.display) {
                    document.getElementById('countdownTimer').textContent = remaining.display;
                }

                // Update timer every second
                this.countdownInterval = setInterval(() => {
                    const now = new Date();
                    const lockTime = new Date(lockUntil);
                    const remainingMs = lockTime - now;

                    if (remainingMs <= 0) {
                        // Lock expired - hide overlay
                        clearInterval(this.countdownInterval);
                        document.getElementById('lockoutOverlay').classList.add('d-none');

                        // Reset UI counter
                        const attemptsWarning = document.getElementById('attemptsWarning');
                        if (attemptsWarning) {
                            attemptsWarning.textContent = 'Failed attempts: 0/3';
                            attemptsWarning.classList.add('d-none');
                        }
                    } else {
                        const remainingSec = Math.floor(remainingMs / 1000);
                        const mins = Math.floor(remainingSec / 60);
                        const secs = remainingSec % 60;
                        document.getElementById('countdownTimer').textContent =
                            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    }
                }, 1000);
            },



            unlockAccount: async function() {
                console.log('Unlocking account...');
                StockSenseAPI.resetSecurity();
                this.hideAllOverlays();
            }
        };

        // Test functions
        function testAdminLogin() {
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = 'Admin@1234567890abc';
            App.handleLogin(new Event('submit'));
        }

        function testStaffLogin() {
            document.getElementById('username').value = 'staff';
            document.getElementById('password').value = 'Staff@1234567890xyz';
            App.handleLogin(new Event('submit'));
        }

        function clearAllData() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorContainer').classList.add('d-none');
            document.getElementById('successContainer').classList.add('d-none');
            App.hideAllOverlays();
            console.log('All data cleared');
        }


        // Initialize the app when the page loads
        document.addEventListener('DOMContentLoaded', function () {
            App.init();
        });
    </script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
