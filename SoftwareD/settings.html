<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Settings</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }

        #mainContent {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .noti-badge {
            padding: 0.35em 0.5em;
            line-height: 1;
        }

        .dropdown-toggle::after {
            display: none !important;
        }

        .nav-link-custom {
            position: relative;
            color: #64748b;
            font-weight: 500;
            padding: 0.5rem 0.25rem;
            margin: 0 0.75rem;
        }

        .nav-link-custom:hover {
            color: #0d6efd;
        }

        .nav-link-custom.active {
            color: #0d6efd;
        }

        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }

        .security-banner {
            background: linear-gradient(135deg, #0b5e9e 0%, #084298 100%);
            color: white;
        }

        .settings-card {
            transition: all 0.3s ease;
        }

        .settings-card:hover {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        }
    </style>
</head>

<body>
    <script src="api.js?v=1.2"></script>
    <script>
        const session = StockSenseAPI.getSession();
        if (!session || session.role !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>

    <!-- Static Security Banner -->
    <div class="security-banner px-4 py-2 small d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-gear fs-5"></i>
            <span>Supplier Procurement | Role: <span class="fw-bold">Admin</span> | <span id="userNamePlaceholder">...</span></span>
        </div>
        <button onclick="SettingsPage.logout()"
            class="btn btn-link text-white p-0 text-decoration-none small opacity-75">Logout</button>
    </div>

    <!-- Static Top Navigation -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="admin-dashboard.html">
                <div class="bg-primary bg-gradient rounded-3 p-2 text-white">
                    <i class="bi bi-boxes fs-4"></i>
                </div>
                <span class="fw-bold text-dark fs-4">StockSense PH</span>
            </a>

            <div class="d-flex align-items-center gap-2 ms-auto">
                <!-- Notification Bell -->
                <div class="dropdown me-3">
                    <a class="nav-link-custom position-relative dropdown-toggle p-2" href="#" id="notiDropdown"
                        role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-bell fs-5"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger noti-badge"
                            style="font-size: 0.6rem; display: none;">
                            0
                        </span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end shadow border-0 py-0 overflow-hidden"
                        aria-labelledby="notiDropdown" style="width: 280px; margin-top: 1rem;">
                        <div class="p-2 border-bottom bg-light">
                            <h6 class="mb-0 fw-bold small px-2">Notifications</h6>
                        </div>
                        <div id="notificationList" style="max-height: 300px; overflow-y: auto;">
                            <div class="p-3 text-center text-secondary small">Loading...</div>
                        </div>
                    </div>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="admin-dashboard.html" class="nav-link-custom">Dashboard</a></li>
                    <li class="nav-item"><a href="inventory.html" class="nav-link-custom">Inventory</a></li>
                    <li class="nav-item"><a href="sales.html" class="nav-link-custom">Sales</a></li>
                    <li class="nav-item"><a href="orders.html" class="nav-link-custom">Orders</a></li>
                    <li class="nav-item"><a href="suppliers.html" class="nav-link-custom">Suppliers</a></li>
                    <li class="nav-item"><a href="reports.html" class="nav-link-custom">Reports</a></li>
                    <li class="nav-item"><a href="#" class="nav-link-custom active">Settings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="settingsApp">
        <div class="d-flex justify-content-center align-items-center" style="min-height: 400px;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading settings...</span>
            </div>
        </div>
    </div>

    <script>
        const SettingsPage = {
            session: null,
            userModal: null,
            users: [],

            init: async function () {
                this.session = StockSenseAPI.getSession();
                await this.render();
                
                // Initialize Modal after rendering HTML
                this.userModal = new bootstrap.Modal(document.getElementById('userModal'));
                await this.loadUsers();
                
                StockSenseAPI.checkLowStock();
            },

            loadUsers: async function () {
                const tbody = document.querySelector('#usersTable tbody');
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-primary spinner-border-sm"></div> Loading users...</td></tr>';
                
                this.users = await StockSenseAPI.getUsers();
                
                if (this.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-secondary">No users found</td></tr>';
                    return;
                }

                tbody.innerHTML = this.users.map(user => `
                    <tr>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; font-weight: 600;">
                                    ${user.name.charAt(0)}
                                </div>
                                <span class="fw-medium text-dark">${user.name}</span>
                            </div>
                        </td>
                        <td>${user.username}</td>
                        <td><span class="badge bg-light text-dark border">${user.employeeId}</span></td>
                        <td>
                            <span class="badge ${user.role === 'admin' ? 'bg-danger' : 'bg-primary'} bg-opacity-10 ${user.role === 'admin' ? 'text-danger' : 'text-primary'} px-2 py-1 rounded-pill">
                                ${user.role === 'admin' ? 'Administrator' : 'Staff'}
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-light border me-1" onclick="SettingsPage.editUser(${user.id})" title="Edit User">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-light border text-danger" onclick="SettingsPage.deleteUser(${user.id})" ${user.username === 'admin' ? 'disabled' : ''} title="Delete User">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            },

            showAddUserModal: function () {
                document.getElementById('userForm').reset();
                document.getElementById('userId').value = '';
                document.getElementById('userModalTitle').textContent = 'Add New User';
                document.getElementById('passwordHelp').textContent = "Default password for new users is 'User@123' if left blank.";
                this.userModal.show();
            },

            editUser: function (id) {
                const user = this.users.find(u => u.id == id);
                if (!user) return;

                document.getElementById('userId').value = user.id;
                document.getElementById('userName').value = user.name;
                document.getElementById('userEmpId').value = user.employeeId;
                document.getElementById('userUsername').value = user.username;
                document.getElementById('userRole').value = user.role;
                document.getElementById('userPassword').value = '';
                
                document.getElementById('userModalTitle').textContent = 'Edit User';
                document.getElementById('passwordHelp').textContent = "Leave blank to keep current password.";
                
                this.userModal.show();
            },

            saveUser: async function () {
                const form = document.getElementById('userForm');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                const userData = {
                    id: document.getElementById('userId').value,
                    name: document.getElementById('userName').value,
                    employeeId: document.getElementById('userEmpId').value,
                    username: document.getElementById('userUsername').value,
                    role: document.getElementById('userRole').value,
                    password: document.getElementById('userPassword').value
                };

                // Simple validation for edit vs add password logic
                if (!userData.id && !userData.password) {
                    userData.password = 'User@123';
                }

                const result = await StockSenseAPI.saveUser(userData);
                
                if (result.success) {
                    StockSenseAPI.showNotification('Success', userData.id ? 'User updated successfully.' : 'User created successfully.', 'success');
                    this.userModal.hide();
                    this.loadUsers();
                } else {
                    let errorMsg = 'Failed to save user.';
                    if (result.message) {
                        if (result.message.includes('UNIQUE KEY constraint')) {
                            errorMsg = 'That Username or Employee ID is already taken. Please try another.';
                        } else {
                            errorMsg = result.message;
                        }
                    }
                    StockSenseAPI.showNotification('Error', errorMsg, 'danger');
                }
            },

            deleteUser: async function (id) {
                const user = this.users.find(u => u.id == id);
                if (!user) return;
                
                if (user.username === 'admin') {
                    alert('Cannot delete the primary admin account.');
                    return;
                }

                if (confirm(`Are you sure you want to delete user ${user.name} (${user.username})?`)) {
                    const result = await StockSenseAPI.deleteUser(id, user.username);
                    if (result.success) {
                        StockSenseAPI.showNotification('Deleted', 'User has been removed.', 'success');
                        this.loadUsers();
                    } else {
                        StockSenseAPI.showNotification('Error', 'Failed to delete user.', 'danger');
                    }
                }
            },

            render: async function () {
                // Update session info
                document.getElementById('userNamePlaceholder').textContent = this.session.name;

                const html = `
                    <!-- Main Content -->
                    <main class="container py-4" id="mainContent">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h2 class="fw-bold mb-1">User Management</h2>
                                <p class="text-secondary small mb-0">Manage system access and roles</p>
                            </div>
                            <button class="btn btn-primary shadow-sm" onclick="SettingsPage.showAddUserModal()">
                                <i class="bi bi-person-plus me-2"></i> Add New User
                            </button>
                        </div>

                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0" id="usersTable">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-4">Name</th>
                                                <th>Username</th>
                                                <th>Employee ID</th>
                                                <th>Role</th>
                                                <th class="text-end pe-4">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <!-- User rows will be loaded here -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- User Modal -->
                        <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content border-0 shadow">
                                    <div class="modal-header bg-primary text-white">
                                        <h5 class="modal-title fw-bold" id="userModalTitle">Add New User</h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form id="userForm">
                                            <input type="hidden" id="userId">
                                            <div class="mb-3">
                                                <label class="form-label small fw-medium">Full Name <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" id="userName" required placeholder="e.g. John Doe">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label small fw-medium">Employee ID <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" id="userEmpId" required placeholder="e.g. EMP-2024-001">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label small fw-medium">Username <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" id="userUsername" required placeholder="e.g. jdoe">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label small fw-medium">Password</label>
                                                <input type="password" class="form-control" id="userPassword" placeholder="Leave blank to keep existing password" minlength="8" maxlength="16">
                                                <div class="form-text" id="passwordHelp">Default password for new users is 'User@123' if left blank.</div>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label small fw-medium">Role <span class="text-danger">*</span></label>
                                                <select class="form-select" id="userRole" required>
                                                    <option value="staff">Staff</option>
                                                    <option value="admin">Administrator</option>
                                                </select>
                                            </div>
                                        </form>
                                    </div>
                                    <div class="modal-footer bg-light">
                                        <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancel</button>
                                        <button type="button" class="btn btn-primary" onclick="SettingsPage.saveUser()">Save User</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </main>
                `;
                document.getElementById('settingsApp').innerHTML = html;
            },

            clearAllData: async function () {
                if (confirm('Are you sure? This will clear all demo data.')) {
                    localStorage.clear();
                    sessionStorage.clear();
                    alert('All data cleared!');
                    window.location.href = 'login.html';
                }
            },

            logout: async function () {
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            }
        };

        // Initialize the page when DOM is ready
        document.addEventListener('DOMContentLoaded', function () {
            SettingsPage.init();
        });
    </script>

    <!-- Notification Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100" id="toastContainer"></div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
