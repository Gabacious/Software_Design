<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0a1a2f 0%, #1a3b5c 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <script src="api.js"></script>
    <script>
        const session = StockSenseAPI.getSession();
        if (!session) {
            window.location.href = 'login.html';
        } else {
            // Redirect based on role
            setTimeout(() => {
                if (session.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'staff-dashboard.html';
                }
            }, 1000);
        }
    </script>
    
    <div class="text-center text-white">
        <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center">
            <svg class="w-10 h-10 text-blue-400 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
        </div>
        <h2 class="text-2xl font-bold mb-2">Welcome back, ${session ? session.name : ''}!</h2>
        <p class="text-slate-400 mb-4">Redirecting to your dashboard...</p>
        <div class="w-48 h-2 bg-white/20 rounded-full mx-auto overflow-hidden">
            <div class="h-full bg-blue-500 rounded-full animate-pulse" style="width: 75%"></div>
        </div>
    </div>
</body>
</html>
