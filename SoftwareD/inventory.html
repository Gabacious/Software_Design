<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense PH - Inventory Management</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        #mainContent {
            animation: fadeIn 0.5s ease-in-out;
        }

        .admin-only,
        .staff-only {
            display: none !important;
        }

        body.role-admin .admin-only {
            display: block !important;
        }

        body.role-admin li.admin-only {
            display: list-item !important;
        }

        body.role-staff .staff-only {
            display: block !important;
        }

        body.role-staff li.staff-only {
            display: list-item !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-link-custom {
            position: relative;
            color: #64748b;
            font-weight: 500;
            padding: 0.5rem 0.25rem;
            margin: 0 0.75rem;
            text-decoration: none;
        }

        .nav-link-custom:hover {
            color: #0d6efd;
        }

        .nav-link-custom.active {
            color: #0d6efd;
        }

        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }

        /* Staff theme overrides */
        .staff-theme .nav-link-custom:hover {
            color: #198754;
        }

        .staff-theme .nav-link-custom.active {
            color: #198754;
        }

        .staff-theme .nav-link-custom.active::after {
            background: #198754;
        }

        .staff-theme .btn-primary {
            background-color: #198754;
            border-color: #198754;
        }

        .staff-theme .btn-primary:hover {
            background-color: #146c43;
            border-color: #146c43;
        }

        .staff-theme .text-primary {
            color: #198754 !important;
        }

        .staff-theme .bg-primary {
            background-color: #198754 !important;
        }

        .staff-theme .bg-primary.bg-gradient {
            background: linear-gradient(135deg, #198754 0%, #146c43 100%) !important;
        }

        .staff-theme .badge.bg-primary {
            background-color: #198754 !important;
        }

        .security-banner {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .admin-banner {
            background: linear-gradient(135deg, #0b5e9e 0%, #084298 100%);
            color: white;
        }

        .staff-banner {
            background: linear-gradient(135deg, #198754 0%, #146c43 100%);
            color: white;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.5rem;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-instock {
            background-color: #d1fae5;
            color: #065f46;
        }

        .status-lowstock {
            background-color: #fef3c7;
            color: #92400e;
        }

        .status-outofstock {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .staff-stat-icon.bg-primary {
            background-color: rgba(25, 135, 84, 0.1) !important;
            color: #198754 !important;
        }

        .noti-badge {
            padding: 0.35em 0.5em;
            line-height: 1;
        }

        .dropdown-toggle::after {
            display: none !important;
        }
    </style>
</head>

<body>
    <script src="api.js"></script>
    <!-- INLINE API - Everything is self-contained -->
    <script>
        // ==========================================
        // STOCKSENSE API - COMPLETE SELF-CONTAINED
        // ==========================================

        // Create the API object



        // ==========================================
        // PAGE SPECIFIC CODE
        // ==========================================

        // Check session
        const session = StockSenseAPI.getSession();
        console.log('Current session:', session);

        if (!session) {
            console.log('No session, redirecting to login');
            window.location.href = 'login.html';
        }

        const isAdmin = session ? session.role === 'admin' : false;
        const isStaff = session ? session.role === 'staff' : false;
    </script>

    <!-- Static Security Banner -->
    <div id="securityBanner" class="security-banner d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-shield-check fs-5"></i>
            <span>Supplier Procurement | Role: <span id="userRolePlaceholder" class="fw-bold">...</span> | <span id="userNamePlaceholder">...</span></span>
        </div>
        <button onclick="InventoryPage.logout()"
            class="btn btn-link text-white p-0 text-decoration-none small opacity-75">Logout</button>
    </div>

    <!-- Static Top Navigation -->
    <nav id="mainNavbar" class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#" id="brandLink">
                <div id="brandIcon" class="rounded-3 p-2 text-white">
                    <i class="bi bi-boxes fs-4"></i>
                </div>
                <span class="fw-bold text-dark fs-4">StockSense PH</span>
            </a>

            <div class="d-flex align-items-center gap-2 ms-auto">
                <!-- Notification Bell -->
                <div class="dropdown me-3">
                    <a class="nav-link-custom position-relative dropdown-toggle p-2" href="#" id="notiDropdown"
                        role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-bell fs-5"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger noti-badge"
                            style="font-size: 0.6rem; display: none;">
                            0
                        </span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end shadow border-0 py-0 overflow-hidden"
                        aria-labelledby="notiDropdown" style="width: 280px; margin-top: 1rem;">
                        <div class="p-2 border-bottom bg-light">
                            <h6 class="mb-0 fw-bold small px-2">Notifications</h6>
                        </div>
                        <div id="notificationList" style="max-height: 300px; overflow-y: auto;">
                            <div class="p-3 text-center text-secondary small">Loading...</div>
                        </div>
                    </div>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="#" id="dashboardLink" class="nav-link-custom">Dashboard</a></li>
                    <li class="nav-item"><a href="#" class="nav-link-custom active">Inventory</a></li>
                    <li class="nav-item"><a href="sales.html" class="nav-link-custom">Sales</a></li>
                    <li class="nav-item admin-only"><a href="orders.html" class="nav-link-custom">Orders</a></li>
                    <li class="nav-item admin-only"><a href="suppliers.html" class="nav-link-custom">Suppliers</a></li>
                    <li class="nav-item admin-only"><a href="reports.html" class="nav-link-custom">Reports</a></li>
                    <li class="nav-item admin-only"><a href="settings.html" class="nav-link-custom">Settings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="inventoryApp">
        <div class="d-flex justify-content-center align-items-center" style="min-height: 400px;">
            <div class="text-center">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-secondary">Loading inventory data...</p>
            </div>
        </div>
    </div>

    <!-- Notification Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100" id="toastContainer"></div>

    <script>
        // Main page code
        const InventoryPage = {
            session: null,
            isAdmin: false,
            isStaff: false,

            init: async function () {
                console.log('InventoryPage.init() called');

                this.session = StockSenseAPI.getSession();
                console.log('Session in init:', this.session);

                if (!this.session) {
                    console.log('No session, redirecting to login');
                    window.location.href = 'login.html';
                    return;
                }

                this.isAdmin = this.session.role === 'admin';
                this.isStaff = this.session.role === 'staff';

                this.suppliers = await StockSenseAPI.getSuppliers();
                await this.render();

                // Check for low stock alerts on load
                setTimeout(() => StockSenseAPI.checkLowStock(), 1000);
            },

            getStatusClass: async function (stock) {
                if (stock <= 0) return 'status-outofstock';
                if (stock < 20) return 'status-lowstock';
                return 'status-instock';
            },

            getStatusText: async function (stock) {
                if (stock <= 0) return 'Out of Stock';
                if (stock < 20) return 'Low Stock';
                return 'In Stock';
            },

            render: async function () {
                console.log('InventoryPage.render() called');

                // Apply role-based classes to body
                document.body.className = this.isAdmin ? 'role-admin' : 'role-staff';

                // Update session info
                document.getElementById('userNamePlaceholder').textContent = this.session.name;
                document.getElementById('userRolePlaceholder').textContent = this.isAdmin ? 'Admin' : 'Staff';

                // Update layout elements
                const banner = document.getElementById('securityBanner');
                banner.className = `security-banner ${this.isAdmin ? 'admin-banner' : 'staff-banner'} d-flex justify-content-between align-items-center`;

                const navbar = document.getElementById('mainNavbar');
                if (this.isStaff) navbar.classList.add('staff-theme');

                const dashboardLink = this.isAdmin ? 'admin-dashboard.html' : 'staff-dashboard.html';
                document.getElementById('dashboardLink').href = dashboardLink;
                document.getElementById('brandLink').href = dashboardLink;

                const brandIcon = document.getElementById('brandIcon');
                brandIcon.className = this.isAdmin ? 'bg-primary bg-gradient rounded-3 p-2 text-white' : 'bg-success bg-gradient rounded-3 p-2 text-white';

                // Get inventory data from API
                const inventory = await StockSenseAPI.getInventory();
                console.log('Inventory data:', inventory);

                // Filter out discontinued for statistics
                const activeInventory = inventory.filter(i => i.status !== 'discontinued');

                const stats = {
                    totalItems: activeInventory.length,
                    totalValue: activeInventory.reduce((sum, item) => sum + (item.price * item.stock), 0),
                    lowStock: activeInventory.filter(i => i.stock < i.reorderLevel && i.stock > 0).length,
                    outOfStock: activeInventory.filter(i => i.stock === 0).length
                };

                const dashboardUrl = this.isAdmin ? 'admin-dashboard.html' : 'staff-dashboard.html';
                const themeClass = this.isStaff ? 'staff-theme' : '';

                const html = `
                    <!-- Main Content -->
                    <main class="container py-4 ${themeClass}" id="mainContent">
                        <!-- Header -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h2 class="fw-bold mb-1">Inventory Management</h2>
                                <p class="text-secondary small mb-0">Manage your products and stock levels</p>
                            </div>
                            ${this.isAdmin ? `
                                <button onclick="InventoryPage.addItem()" class="btn btn-primary d-flex align-items-center gap-2 shadow-sm rounded-pill px-4">
                                    <i class="bi bi-plus-lg"></i>
                                    <span>Add Product</span>
                                </button>
                            ` : ''}
                        </div>

                        <!-- Stats Cards -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon ${this.isAdmin ? 'bg-primary bg-opacity-10 text-primary' : 'bg-success bg-opacity-10 text-success'}">
                                                <i class="bi bi-box"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Total Items</p>
                                                <h4 class="fw-bold mb-0">${stats.totalItems}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon ${this.isAdmin ? 'bg-primary bg-opacity-10 text-primary' : 'bg-success bg-opacity-10 text-success'}">
                                                <i class="bi bi-currency-dollar"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Inventory Value</p>
                                                <h4 class="fw-bold mb-0">${StockSenseAPI.formatCurrency(stats.totalValue)}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                                                <i class="bi bi-exclamation-triangle"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Low Stock</p>
                                                <h4 class="fw-bold mb-0">${stats.lowStock}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="stat-icon bg-danger bg-opacity-10 text-danger">
                                                <i class="bi bi-x-circle"></i>
                                            </div>
                                            <div>
                                                <p class="text-secondary small mb-1">Out of Stock</p>
                                                <h4 class="fw-bold mb-0">${stats.outOfStock}</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Inventory Table -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white border-0 pt-4 pb-0">
                                <h5 class="fw-bold mb-0">Product Inventory</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Product</th>
                                                <th>SKU</th>
                                                <th>Category</th>
                                                <th>Price</th>
                                                <th>Stock</th>
                                                <th>Status</th>
                                                ${this.isAdmin ? `<th>Actions</th>` : ''}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${inventory.map(item => `
                                                <tr>
                                                    <td class="fw-medium">${item.name}</td>
                                                    <td class="small text-secondary">${item.sku}</td>
                                                    <td class="small">${item.category}</td>
                                                    <td class="fw-medium">${StockSenseAPI.formatCurrency(item.price)}</td>
                                                    <td>
                                                        <span class="${item.stock < item.reorderLevel ? 'text-warning fw-bold' : ''}">${item.stock}</span>
                                                        <small class="text-secondary ms-1">/ min ${item.reorderLevel}</small>
                                                    </td>
                                                    <td>
                                                        <div class="d-flex flex-column gap-1">
                                                            ${StockSenseAPI.getStatusBadge(item.status || 'active')}
                                                            <span class="${StockSenseAPI.getStatusClass(item.stock, item.reorderLevel)} status-badge" style="font-size: 0.7rem;">
                                                                ${StockSenseAPI.getStatusText(item.stock, item.reorderLevel)}
                                                            </span>
                                                        </div>
                                                    </td>
                                                    ${this.isAdmin ? `
                                                    <td>
                                                        <div class="d-flex gap-2">
                                                            ${item.stock < item.reorderLevel ? `
                                                                <button onclick="InventoryPage.reorderItem(${item.id}, '${item.name.replace(/'/g, "\\'")}', ${item.price}, ${item.reorderLevel}, ${item.stock}, ${item.supplier_id || 'null'}, '${(item.supplier_name || 'N/A').replace(/'/g, "\\'")}')" class="btn btn-sm btn-warning shadow-sm" title="Quick Reorder">
                                                                    <i class="bi bi-cart-plus-fill"></i>
                                                                </button>
                                                            ` : ''}
                                                            <button onclick="InventoryPage.editItem(${item.id})" class="btn btn-sm btn-outline-primary shadow-sm" title="Edit Item">
                                                                <i class="bi bi-pencil-square"></i>
                                                            </button>
                                                            <button onclick="InventoryPage.deleteItem(${item.id})" class="btn btn-sm btn-outline-danger shadow-sm" title="Delete Item">
                                                                <i class="bi bi-trash"></i>
                                                            </button>
                                                        </div>
                                                    </td>` : ''}
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        ${!this.isAdmin ? `
                        <div class="alert alert-warning bg-opacity-10 border-0 mt-4">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            Staff access is view-only. Contact admin to add or edit products.
                        </div>
                        ` : ''}
                    </main>

                    <!-- Inventory Modal (Add/Edit) -->
                    <div class="modal fade" id="inventoryModal" tabindex="-1" aria-labelledby="inventoryModalLabel" aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered modal-lg">
                            <div class="modal-content border-0 shadow">
                                <div class="modal-header bg-primary bg-opacity-10 border-0">
                                    <h5 class="modal-title fw-bold text-primary" id="inventoryModalLabel">Product Details</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body p-4">
                                    <form id="inventoryForm">
                                        <input type="hidden" id="invId">
                                        
                                        <div class="row g-3 mb-3">
                                            <div class="col-md-8">
                                                <label class="form-label text-secondary small fw-medium">Product Name <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" id="invName" required placeholder="e.g. Chocolate Moist Cake">
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label text-secondary small fw-medium">Status</label>
                                                <select class="form-select" id="invStatus">
                                                    <option value="active">Active</option>
                                                    <option value="inactive">Inactive</option>
                                                    <option value="discontinued">Discontinued</option>
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div class="row g-3 mb-3">
                                            <div class="col-md-6">
                                                <label class="form-label text-secondary small fw-medium">SKU <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" id="invSku" required placeholder="SKU-001">
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label text-secondary small fw-medium">Category <span class="text-danger">*</span></label>
                                                <select class="form-select" id="invCategory" required>
                                                    <option value="" selected disabled>Select Category</option>
                                                    <option value="Bread">Bread</option>
                                                    <option value="Cakes">Cakes</option>
                                                    <option value="Pastries">Pastries</option>
                                                    <option value="Donuts">Donuts</option>
                                                    <option value="Beverages">Beverages</option>

                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div class="row g-3">
                                            <div class="col-md-4">
                                                <label class="form-label text-secondary small fw-medium">Price (₱) <span class="text-danger">*</span></label>
                                                <input type="number" step="0.01" min="0" class="form-control" id="invPrice" required placeholder="0.00">
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label text-secondary small fw-medium">Stock Count <span class="text-danger">*</span></label>
                                                <input type="number" min="0" class="form-control" id="invStock" required placeholder="0">
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label text-secondary small fw-medium">Reorder Level</label>
                                                <input type="number" min="0" class="form-control" id="invReorderLevel" required placeholder="10">
                                            </div>
                                            <div class="col-md-8 mt-3">
                                                <label class="form-label text-secondary small fw-medium">Primary Supplier</label>
                                                <select class="form-select" id="invSupplier">
                                                    <option value="">None / Unassigned</option>
                                                    ${this.suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                                                </select>
                                                <div class="form-text small">This supplier will be used for automated and quick reorders.</div>
                                            </div>
                                        </div>
                                    </form>
                                    
                                    <div id="invError" class="alert alert-danger d-none mt-3 mb-0 small py-2"></div>
                                </div>
                                <div class="modal-footer border-0 bg-light">
                                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                                    <button type="button" class="btn btn-primary px-4 fw-medium" onclick="InventoryPage.saveItem(event)" id="saveBtn">
                                        <span id="saveSpinner" class="spinner-border spinner-border-sm d-none me-2" role="status"></span>
                                        Save Product
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Reorder Modal -->
                    <div class="modal fade" id="reorderModal" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content border-0 shadow">
                                <div class="modal-header bg-warning text-dark border-0">
                                    <h5 class="modal-title fw-bold"><i class="bi bi-cart-plus me-2"></i>Quick Reorder</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body p-4">
                                    <div class="text-center mb-4">
                                        <h6 class="text-secondary small mb-1">Linked Supplier</h6>
                                        <h5 class="fw-bold text-dark" id="reorderSupplierName">...</h5>
                                        <hr class="my-3 opacity-10">
                                        <h6 class="text-secondary small mb-1">Product to Reorder</h6>
                                        <h4 class="fw-bold" id="reorderItemName">...</h4>
                                        <p class="text-danger small fw-bold mb-0" id="reorderStockStatus">Current Stock: 0 / Min: 0</p>
                                    </div>
                                    <div class="row g-3">
                                        <div class="col-6">
                                            <label class="form-label small fw-bold">Reorder Qty</label>
                                            <input type="number" id="reorderQty" class="form-control" value="50">
                                        </div>
                                        <div class="col-6">
                                            <label class="form-label small fw-bold">Unit Price</label>
                                            <div class="input-group">
                                                <span class="input-group-text">₱</span>
                                                <input type="text" id="reorderPrice" class="form-control" readonly>
                                            </div>
                                        </div>
                                        <div class="col-12">
                                            <div class="p-3 bg-light rounded border">
                                                <div class="d-flex justify-content-between align-items-center">
                                                    <span class="small fw-bold">Estimated Total:</span>
                                                    <span class="h5 fw-bold text-primary mb-0" id="reorderTotal">₱0.00</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-12 mt-4">
                                            <div class="form-check p-3 bg-primary bg-opacity-10 rounded border border-primary-subtle">
                                                <input class="form-check-input" type="checkbox" id="reorderSignature" onchange="document.getElementById('confirmReorderBtn').disabled = !this.checked">
                                                <label class="form-check-label small fw-bold text-primary" for="reorderSignature">
                                                    I authorize this quick reorder and digital signature.
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="modal-footer border-0 bg-light">
                                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                                    <button type="button" class="btn btn-primary px-4 fw-bold shadow-sm" id="confirmReorderBtn" disabled onclick="InventoryPage.confirmQuickReorder()">
                                        Place Order Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                console.log('Setting HTML content');
                document.getElementById('inventoryApp').innerHTML = html;
                console.log('Page rendered successfully');
            },

            addItem: function () {
                document.getElementById('inventoryModalLabel').textContent = 'Add New Product';
                document.getElementById('inventoryForm').reset();
                document.getElementById('invId').value = '';
                document.getElementById('invStatus').value = 'active';
                document.getElementById('invSupplier').value = '';
                document.getElementById('invError').classList.add('d-none');

                const modal = new bootstrap.Modal(document.getElementById('inventoryModal'));
                modal.show();
            },

            editItem: async function (id) {
                const inventory = await StockSenseAPI.getInventory();
                const item = inventory.find(i => i.id == id);
                if (!item) return;

                document.getElementById('inventoryModalLabel').textContent = 'Edit Product';
                document.getElementById('invId').value = item.id;
                document.getElementById('invName').value = item.name;
                document.getElementById('invSku').value = item.sku;
                document.getElementById('invCategory').value = item.category;
                document.getElementById('invPrice').value = item.price;
                document.getElementById('invStock').value = item.stock;
                document.getElementById('invReorderLevel').value = item.reorderLevel;
                document.getElementById('invStatus').value = item.status || 'active';
                document.getElementById('invSupplier').value = item.supplier_id || '';

                document.getElementById('invError').classList.add('d-none');

                const modal = new bootstrap.Modal(document.getElementById('inventoryModal'));
                modal.show();
            },

            reorderItem: function (id, name, price, reorderLevel, stock, supplierId, supplierName) {
                this.currentReorderData = { id, name, price, supplierId };
                
                document.getElementById('reorderSupplierName').textContent = supplierName;
                document.getElementById('reorderItemName').textContent = name;
                document.getElementById('reorderStockStatus').textContent = `Current Stock: ${stock} / Min: ${reorderLevel}`;
                document.getElementById('reorderPrice').value = price.toFixed(2);
                
                const qtyInput = document.getElementById('reorderQty');
                const qty = Math.max(50, (reorderLevel * 2) - stock);
                qtyInput.value = qty;
                
                const updateTotal = () => {
                    const q = parseInt(document.getElementById('reorderQty').value) || 0;
                    const p = parseFloat(document.getElementById('reorderPrice').value) || 0;
                    document.getElementById('reorderTotal').textContent = StockSenseAPI.formatCurrency(q * p);
                };
                
                qtyInput.oninput = updateTotal;
                updateTotal();
                
                document.getElementById('reorderSignature').checked = false;
                document.getElementById('confirmReorderBtn').disabled = true;
                
                const modal = new bootstrap.Modal(document.getElementById('reorderModal'));
                modal.show();
            },
            
            confirmQuickReorder: async function () {
                const data = this.currentReorderData;
                const qty = parseInt(document.getElementById('reorderQty').value);
                
                if (!data.supplierId || data.supplierId === 'null') {
                    alert('This product does not have a linked supplier. Please edit the product to assign a supplier first.');
                    return;
                }

                if (!qty || qty <= 0) {
                    alert('Please enter a valid quantity');
                    return;
                }
                
                const orderData = {
                    supplier_id: data.supplierId,
                    items: [{
                        product_id: data.id,
                        quantity: qty,
                        price: data.price,
                        subtotal: qty * data.price
                    }],
                    total: qty * data.price
                };
                
                const btn = document.getElementById('confirmReorderBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Placing Order...';
                
                const result = await StockSenseAPI.createOrder(orderData);
                
                if (result.success) {
                    bootstrap.Modal.getInstance(document.getElementById('reorderModal')).hide();
                    StockSenseAPI.showNotification('Success', `Purchase order ${result.order_id} created successfully!`, 'success');
                    await this.render();
                } else {
                    alert(result.message || 'Failed to place order');
                    btn.disabled = false;
                    btn.innerHTML = 'Place Order Now';
                }
            },

            deleteItem: async function (id) {
                if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) return;

                const result = await StockSenseAPI.deleteInventory(id);
                if (result && result.success) {
                    await this.render();
                } else {
                    alert(result?.message || 'Failed to delete item');
                }
            },

            saveItem: async function (e) {
                e.preventDefault();

                const id = document.getElementById('invId').value;
                const data = {
                    name: document.getElementById('invName').value.trim(),
                    sku: document.getElementById('invSku').value.trim(),
                    category: document.getElementById('invCategory').value.trim(),
                    price: parseFloat(document.getElementById('invPrice').value),
                    stock: parseInt(document.getElementById('invStock').value),
                    reorderLevel: parseInt(document.getElementById('invReorderLevel').value),
                    status: document.getElementById('invStatus').value,
                    supplier_id: document.getElementById('invSupplier').value || null
                };

                const errorBox = document.getElementById('invError');
                const saveBtn = document.getElementById('saveBtn');
                const saveSpinner = document.getElementById('saveSpinner');

                if (!data.name || !data.sku || !data.category || isNaN(data.price) || isNaN(data.stock)) {
                    errorBox.textContent = 'Please fill in all required fields correctly.';
                    errorBox.classList.remove('d-none');
                    return;
                }

                saveBtn.disabled = true;
                saveSpinner.classList.remove('d-none');
                errorBox.classList.add('d-none');

                let result;
                if (id) {
                    result = await StockSenseAPI.updateInventory(id, data);
                } else {
                    result = await StockSenseAPI.addInventory(data);
                }

                if (result && result.success) {
                    const modalEl = document.getElementById('inventoryModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                    await this.render();

                    // Trigger check after save in case stock changed
                    StockSenseAPI.checkLowStock();
                } else {
                    errorBox.textContent = result?.message || 'Failed to save product';
                    errorBox.classList.remove('d-none');
                }

                saveBtn.disabled = false;
                saveSpinner.classList.add('d-none');
            },

            logout: async function () {
                console.log('Logging out...');
                StockSenseAPI.destroySession();
                window.location.href = 'login.html';
            }
        };

        // Initialize the page when DOM is ready
        document.addEventListener('DOMContentLoaded', function () {
            console.log('DOM ready, initializing page...');
            InventoryPage.init();
        });
    </script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
